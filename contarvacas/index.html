<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Contar Vacas Nocturno</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a0a2e, #2d1b4e);
            font-family: 'Arial', sans-serif;
            overflow-y: auto;
            touch-action: manipulation;
            color: #e1bee7;
        }
        
        .header {
            text-align: center;
            margin: 20px 0;
            color: #d1c4e9;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }
        
        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 60vh;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a0a2e, #2d1b4e);
            cursor: pointer;
            border: 2px solid rgba(126, 87, 194, 0.5);
            border-radius: 10px;
            margin: 0 auto;
        }
        
        .pasture {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            background: #1b5e20;
            border-top: 10px dashed #2e7d32;
        }
        
        .fence {
            position: absolute;
            bottom: 30%;
            left: 0;
            width: 100%;
            height: 60px;
            background-image: url('https://i.ibb.co/m5c4ybP2/cerca.png');
            background-size: contain;
            background-repeat: repeat-x;
            z-index: 5;
        }
        
        .barn {
            position: absolute;
            bottom: 30%;
            right: 20px;
            width: 150px;
            height: 120px;
            background-image: url('https://i.ibb.co/kgGHz9sG/corral.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 6;
        }
        
        .counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(30, 30, 60, 0.8);
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 1.2em;
            color: #d1c4e9;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            border: 1px solid #7e57c2;
            z-index: 10;
        }
        
        .message-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ff69b4 0%, #7e57c2 100%);
            padding: 20px 40px;
            border-radius: 25px;
            font-size: 1.5em;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-align: center;
            max-width: 80%;
        }
        
        .message-popup.show {
            opacity: 1;
            animation: popIn 0.5s ease;
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .instructions {
            margin-top: 20px;
            text-align: center;
            color: #b39ddb;
            padding: 0 20px;
            background: rgba(30, 30, 60, 0.7);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #7e57c2;
            max-width: 80%;
        }
        
        .level-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        
        .level-btn {
            padding: 8px 15px;
            background: rgba(30, 30, 60, 0.8);
            color: #d1c4e9;
            border: 1px solid #7e57c2;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .level-btn:hover {
            background: #7e57c2;
        }
        
        .level-btn.active {
            background: #7e57c2;
            color: white;
        }
        
        /* Mensajes superiores exactamente encima del game-container */
        .top-messages {
            position: relative;
            width: 100%;
            max-width: 800px;
            text-align: center;
            z-index: 50;
            pointer-events: none;
            overflow: hidden;
            height: 35px;
            margin: 0 auto;
        }
        
        .top-message {
            position: absolute;
            left: 100%;
            top: 8px;
            white-space: nowrap;
            font-size: 1em;
            color: #e1bee7;
            animation: slideLeft 45s linear forwards;
            text-shadow: 0 0 15px rgba(226, 190, 231, 0.6);
            font-weight: bold;
        }
        
        @keyframes slideLeft {
            0% { left: 100%; }
            100% { left: -100%; }
        }
        
        @keyframes heart-pulse {
    0%, 100% { 
        opacity: 0.7; 
        transform: scale(0.95); 
    }
    50% { 
        opacity: 1; 
        transform: scale(1.1); 
    }
}
        @keyframes jumpToBarn {
            0% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(var(--tx), var(--ty)) scale(1.2);
            }
            100% {
                transform: translate(var(--tx-final), var(--ty-final)) scale(0.8);
                opacity: 0.7;
            }
        }
        
        @keyframes jumpOverFence {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-100px);
            }
            100% {
                transform: translateY(0);
            }
        }
        
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, rgba(67, 55, 111, 0.98), rgba(40, 30, 80, 0.98));
            color: white;
            padding: 40px 50px;
            border-radius: 30px;
            font-size: 2.2em;
            text-align: center;
            box-shadow: 
                0 0 50px rgba(126, 87, 194, 0.6),
                0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 100;
            display: none;
            border: 3px solid rgba(255, 105, 180, 0.5);
            animation: popInMessage 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            min-width: 300px;
        }
        
        .wrong-message {
            background: linear-gradient(145deg, rgba(111, 55, 55, 0.98), rgba(80, 30, 30, 0.98));
            box-shadow: 
                0 0 50px rgba(197, 126, 126, 0.6),
                0 20px 60px rgba(0, 0, 0, 0.5);
            border: 3px solid rgba(221, 179, 179, 0.5);
        }
        
        .message-icon {
            font-size: 3em;
            margin-bottom: 15px;
            animation: bounce 1s infinite;
        }
        
        @keyframes popInMessage {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .btn {
            margin-top: 20px;
            padding: 15px 35px;
            background: linear-gradient(135deg, #ff69b4 0%, #7e57c2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.6);
        }
        
        .btn:active {
            transform: translateY(-1px) scale(1.02);
        }
        
        .wrong-message .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #c0392b 100%);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        
        .wrong-message .btn:hover {
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.6);
        }
            transition: all 0.3s;
            border: 1px solid #7e57c2;
        }
        
        .btn:hover {
            background: #7e57c2;
            transform: scale(1.1);
            box-shadow: 0 0 10px #b39ddb;
        }
        
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: var(--min-opacity, 0.1); }
            50% { opacity: var(--max-opacity, 1); }
        }
        
        .name-stars {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }
        
        .moon {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #f5f5f5;
            border-radius: 50%;
            box-shadow: 0 0 20px #f5f5f5;
            z-index: 2;
        }
        
        /* Tamaño normal para pantallas medianas y grandes */
        @media (min-width: 600px) {
            .moon {
                top: 30px;
                right: 30px;
                width: 60px;
                height: 60px;
            }
        }
        
        @media (min-width: 800px) {
            .moon {
                top: 50px;
                right: 50px;
                width: 80px;
                height: 80px;
            }
        }
        
        .sound-control {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(30, 30, 60, 0.8);
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            border: 1px solid #7e57c2;
            cursor: pointer;
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .animal {
            position: absolute;
            width: 80px;
            height: 80px;
            cursor: pointer;
            user-select: none;
            z-index: 10;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 0.2s;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }
        
        .animal:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }
        
        .animal.moving-left {
            transform: scaleX(-1);
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div class="header">
        <h1>¡Cuenta Vacas para Dormir!</h1>
        <div class="counter" id="counter">Vacas en el corral: 0</div>
        <div class="message-popup" id="messagePopup"></div>
    </div>
    
    <!-- Mensajes superiores exactamente encima del game-container -->
    <div class="top-messages" id="topMessages"></div>
    
    <div class="game-container" id="gameContainer">
        <div class="stars" id="stars"></div>
        <div class="moon"></div>
        <div class="pasture"></div>
        <div class="fence"></div>
        <div class="barn"></div>
        <div class="sound-control" id="soundControl">🔊 Sonido ON</div>
    </div>
    
    <div class="instructions">
        <p>Toca las VACAS cerca de la valla para que salten al corral.</p>
        <p>Los animales aparecerán automáticamente según la dificultad.</p>
        <p>Cuando llegues a 50 vacas, será hora de dormir 💤</p>
    </div>
    
    <div class="level-selector">
        <button class="level-btn" data-level="easy">Fácil</button>
        <button class="level-btn active" data-level="medium">Medio</button>
        <button class="level-btn" data-level="hard">Difícil</button>
    </div>
    
    <div class="message wrong-message" id="wrongAnimalMessage">
        <div class="message-icon">😢</div>
        <div>¡Animal equivocado!</div>
        <div style="font-size: 0.6em; margin-top: 15px; opacity: 0.8;">Solo cuenta las VACAS</div>
        <button class="btn" id="continueBtn">➡️ Continuar</button>
        <button class="btn" id="restartBtn" style="background: linear-gradient(135deg, #ff69b4 0%, #7e57c2 100%); margin-left: 10px;">🔄 Reiniciar</button>
    </div>

    <audio id="cowSound" preload="auto">

    <script>
        // URLs de imágenes
        const cowImageUrl = 'https://i.ibb.co/QFgJ3D0Q/pngegg.png';
        const giraffeImageUrl = 'https://i.ibb.co/gLNKDnJC/jirafa.png';
        const sheepImageUrl = 'https://i.ibb.co/chLkMf3Q/oveja.png';
        const pigImageUrl = 'https://i.ibb.co/20NKCDLp/cerdo.png';
        const horseImageUrl = 'https://i.ibb.co/HfCJ1Zqq/139-1391598-inuyasha-png.png';
        const chickenImageUrl = 'https://i.ibb.co/fVvvW19Z/pollo.png';
        
        const gameContainer = document.getElementById('gameContainer');
        const counter = document.getElementById('counter');
        const wrongAnimalMessage = document.getElementById('wrongAnimalMessage');
        const continueBtn = document.getElementById('continueBtn');
        const starsContainer = document.getElementById('stars');
        const soundControl = document.getElementById('soundControl');
        const ambientSound = document.getElementById('ambientSound');
        const cowSound = document.getElementById('cowSound');
        const wrongSound = document.getElementById('wrongSound');
        const messagePopup = document.getElementById('messagePopup');
        const topMessages = document.getElementById('topMessages');
        
        let cowsInBarn = 0;
        let gameActive = true;
        
        // Mensajes superiores que aparecerán cada 20 y 30 segundos (10 mensajes en total)
        const topMessagesList = [
            "🌙 ¡Buenas noches, mi amor! 💜",
            "💤 Te extraño muchote...",
            "🌙 Cada vaca cuenta para ti...",
            "💤 Sigo contando pensando en ti...",
            "🌙 La luna te está mirando...",
            "💤 Tus ojos brillan más que las estrellas...",
            "🌙 ¿Duermitas ya? 😴",
            "💤 Te quiero más que a las vacas...",
            "🌙 Sueña conmigo esta noche...",
            "💤 Te amo con todo mi corazón... 💜"
        ];
        
        let topMessageIndex = 0;
        
        // Función para mostrar mensaje superior
        function showTopMessage() {
            if (!gameActive) return;
            
            const message = document.createElement('div');
            message.className = 'top-message';
            message.textContent = topMessagesList[topMessageIndex];
            topMessages.appendChild(message);
            
            // Eliminar mensaje después de la animación (30 segundos)
            setTimeout(() => {
                if (message.parentNode) {
                    message.remove();
                }
            }, 30000);
            
            // Siguiente mensaje
            topMessageIndex = (topMessageIndex + 1) % topMessagesList.length;
        }
        
        // Iniciar mensajes superiores
        // Secuencia de tiempos: 20, 30, 20, 30, 20, 30, 20, 30, 20, 30 segundos
        const messageTimes = [20000, 30000, 20000, 30000, 20000, 30000, 20000, 30000, 20000, 30000];
        let messageTimer = 0;
        
        function scheduleNextMessage() {
            if (!gameActive) return;
            
            if (topMessageIndex < topMessagesList.length) {
                setTimeout(() => {
                    showTopMessage();
                    scheduleNextMessage();
                }, messageTimes[topMessageIndex]);
            }
        }
        
        // Configuración de niveles
        const levels = {
            easy: { animalSpeed: 7000, spawnRate: 2500 },
            medium: { animalSpeed: 5000, spawnRate: 1800 },
            hard: { animalSpeed: 3500, spawnRate: 1200 }
        };
        let currentLevel = 'medium'; // Nivel por defecto
        
        // Web Audio API para generar sonido de vaca
        let audioCtx = null;
        
        // Timer para generación automática de animales
        let spawnInterval = null;
        
        // Función para mostrar mensaje popup
        function showMessage(message) {
            messagePopup.textContent = message;
            messagePopup.classList.add('show');
            
            // Sonido de mensaje
            playMessageSound();
            
            setTimeout(() => {
                messagePopup.classList.remove('show');
            }, 2000);
        }
        
        // Sonido para mensajes
        function playMessageSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.2);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
        
        function playCowSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(350, audioCtx.currentTime + 0.1);
            osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.2);
            
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.2);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
        
        function playWrongSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const notes = [523.25, 493.88, 440, 392];
            
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.12);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.12);
                gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + i * 0.12 + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.5);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + i * 0.12);
                osc.stop(audioCtx.currentTime + i * 0.12 + 0.6);
            });
        }
        
        function playVictorySound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // Melodía de victoria: notas ascendentes
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
            
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.15);
                gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + i * 0.15 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + i * 0.15);
                osc.stop(audioCtx.currentTime + i * 0.15 + 0.35);
            });
        }
        
        // Control de sonido (oculto)
        soundControl.style.display = 'none';
        
    // Configuración de símbolos
const SYMBOLS = {
    F: [
        [0,0], [0,1], [0,2], [0,3], [0,4],
        [1,0], [1,2],
        [2,0], [2,2],
        [3,0]
    ],
    B: [
        [0,0], [0,1], [0,2], [0,3], [0,4],
        [1,0], [1,2], [1,4],
        [2,0], [2,2], [2,4],
        [3,1], [3,3]
    ],
    y: [
        [0,0], [0,4],
        [1,1], [1,3],
        [2,2],
        [3,1],
        [4,0]
    ],
    heart: [ // Usamos "heart" en lugar de "♥"
        [1,0], [2,0], [5,0], [6,0],
        [0,1], [3,1], [4,1], [7,1],
        [0,2], [1,2], [2,2], [3,2], [4,2], [5,2], [6,2], [7,2],
        [1,3], [2,3], [3,3], [4,3], [5,3], [6,3],
        [2,4], [3,4], [4,4], [5,4],
        [3,5], [4,5],
        [4,6]
    ]
};

// Constantes de estilo y espaciado
const CONFIG = {
    starSize: 5,
    heartStarSize: 6,
    starSpacing: 16,
    letterSpacing: 20, // Aumentado ligeramente para más espacio entre letras
    heartSpacing: 25,
    verticalOffset: -40, // Ajustado para centrar mejor las letras
    sequence: ['B', ' ', 'y', ' ', 'F', ' ', 'heart'] // Secuencia: B y F Corazón
};

// Crea una estrella en una posición específica
function createStar(x, y, size, isHeart = false) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.width = `${size}px`;
    star.style.height = `${size}px`;
    star.style.left = `${x}px`;
    star.style.top = `${y}px`;

    if (isHeart) {
        star.style.backgroundColor = '#ff3366';
        star.style.borderRadius = '50%';
        star.style.boxShadow = `
            0 0 10px #ff0066,
            0 0 15px #ff0066,
            0 0 20px #ff0066
        `;
        star.style.animation = `heart-pulse ${2 + Math.random() * 3}s infinite ease-in-out`;
    } else {
        star.style.boxShadow = '0 0 8px #fff, 0 0 12px #fff';
        star.style.setProperty('--min-opacity', '0.4');
        star.style.setProperty('--max-opacity', '1');
        star.style.setProperty('--duration', `${2 + Math.random() * 3}s`);
    }

    return star;
}

// Calcula el ancho total para centrar la secuencia
function calculateTotalWidth() {
    let width = 0;
    for (const symbol of CONFIG.sequence) {
        if (symbol === ' ') {
            width += CONFIG.letterSpacing;
            continue;
        }
        if (!SYMBOLS[symbol]) continue;
        const symbolWidth = Math.max(...SYMBOLS[symbol].map(p => p[0])) * CONFIG.starSpacing;
        width += symbolWidth;
        if (symbol === 'heart') width += CONFIG.heartSpacing;
    }
    return width;
}

// Función principal
function createNameStars() {
    const nameContainer = document.createElement('div');
    nameContainer.className = 'name-stars';
    const totalWidth = calculateTotalWidth();
    let currentX = -totalWidth / 2;

    for (const symbol of CONFIG.sequence) {
        if (symbol === ' ') {
            currentX += CONFIG.letterSpacing;
            continue;
        }

        const positions = SYMBOLS[symbol];
        if (!positions) continue;

        const isHeart = symbol === 'heart';
        const size = isHeart ? CONFIG.heartStarSize : CONFIG.starSize;

        for (const [x, y] of positions) {
            const px = currentX + x * CONFIG.starSpacing;
            const py = y * CONFIG.starSpacing + CONFIG.verticalOffset;
            const star = createStar(px, py, size, isHeart);
            nameContainer.appendChild(star);
        }

        const symbolWidth = Math.max(...positions.map(p => p[0])) * CONFIG.starSpacing;
        currentX += symbolWidth;
        if (isHeart) currentX += CONFIG.heartSpacing;
    }

    starsContainer.appendChild(nameContainer);
}



// Añadir este CSS en tus estilos:
/*

        // Crear estrellas de fondo
        function createStars() {
            const starCount = 100;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                
                // Posicionar aleatoriamente pero evitando el área del nombre (aproximadamente)
                let left, top;
                do {
                    left = Math.random() * 100;
                    top = Math.random() * 100;
                } while (top > 10 && top < 30 && left > 30 && left < 70);
                
                star.style.left = `${left}%`;
                star.style.top = `${top}%`;
                
                const minOpacity = Math.random() * 0.2;
                const maxOpacity = 0.3 + Math.random() * 0.3;
                const duration = 3 + Math.random() * 7;
                
                star.style.setProperty('--min-opacity', minOpacity);
                star.style.setProperty('--max-opacity', maxOpacity);
                star.style.setProperty('--duration', `${duration}s`);
                
                starsContainer.appendChild(star);
            }
        }
        
        // Tipos de animales
        const animals = [
            { type: 'cow', image: cowImageUrl, isTarget: true },
            { type: 'giraffe', image: giraffeImageUrl, isTarget: false },
            { type: 'sheep', image: sheepImageUrl, isTarget: false },
            { type: 'pig', image: pigImageUrl, isTarget: false },
            { type: 'horse', image: horseImageUrl, isTarget: false },
            { type: 'chicken', image: chickenImageUrl, isTarget: false }
        ];
        
        // Posición del corral
        const barn = {
            x: gameContainer.offsetWidth - 170,
            y: gameContainer.offsetHeight * 0.7 - 60
        };
        
        // Posición de la valla
        const fence = {
            left: 0,
            right: gameContainer.offsetWidth,
            y: gameContainer.offsetHeight * 0.7 - 30
        };
        
        // Variable para controlar la posición de línea
        let linePosition = 0;
        const lineSpacing = 80; // Espacio entre líneas
        
        // Crear animal
        function createAnimal() {
            if (!gameActive) return;
            
            // 50% de probabilidad de vaca, 50% de otros animales
            const isCow = Math.random() < 0.5;
            let animalData;
            
            if (isCow) {
                animalData = animals.find(a => a.type === 'cow');
            } else {
                const otherAnimals = animals.filter(a => !a.isTarget);
                animalData = otherAnimals[Math.floor(Math.random() * otherAnimals.length)];
            }
            
            const animal = document.createElement('div');
            animal.className = 'animal';
            animal.style.backgroundImage = `url('${animalData.image}')`;
            animal.dataset.type = animalData.type;
            animal.dataset.isTarget = animalData.isTarget;
            
            // Posicionar en línea ordenada (ciclo de 5 líneas)
            const lineIndex = linePosition % 5;
            const baseY = -80 - (lineIndex * lineSpacing);
            
            // Posición X aleatoria en el ancho del contenedor
            const x = 50 + Math.random() * (gameContainer.offsetWidth - 150);
            
            animal.style.left = `${x}px`;
            animal.style.top = `${baseY}px`;
            
            // Incrementar posición de línea para el siguiente animal
            linePosition++;
            
            // Velocidad de caída
            const baseSpeed = levels[currentLevel].animalSpeed;
            const scrollDuration = baseSpeed;
            animal.style.transition = `top ${scrollDuration}ms linear`;
            
            // Mover hacia abajo sin detenerse en el pasto
            setTimeout(() => {
                animal.style.top = `${gameContainer.offsetHeight + 100}px`;
            }, 100);
            
            // Eliminar animal después de salir de la pantalla
            setTimeout(() => {
                if (animal.parentNode) {
                    animal.remove();
                }
            }, scrollDuration + 500);
            
            animal.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!gameActive) return;
                
                const animalX = parseInt(animal.style.left);
                const animalY = parseInt(animal.style.top);
                
                // Reproducir sonido según el tipo de animal
                if (this.dataset.isTarget === 'true') {
                    playCowSound();
                    // Mover al corral
                    moveToBarn(animal, animalX, animalY);
                } else {
                    playWrongSound();
                    wrongAnimalSelected();
                }
            });
            
            gameContainer.appendChild(animal);
            return animal;
        }
        
        // Mover vaca al corral
        function moveToBarn(animal, startX, startY) {
            if (animal.classList.contains('jumping')) return;
            
            animal.classList.add('jumping');
            animal.style.transition = 'none';
            animal.style.animation = 'none';
            
            const dx = barn.x - startX;
            const dy = barn.y - startY;
            
            animal.style.setProperty('--tx', `${dx * 0.5}px`);
            animal.style.setProperty('--ty', `${dy * 0.5 - 100}px`);
            animal.style.setProperty('--tx-final', `${dx}px`);
            animal.style.setProperty('--ty-final', `${dy}px`);
            
            animal.style.animation = 'jumpToBarn 1s forwards';
            
            setTimeout(() => {
                if (animal.dataset.isTarget === 'true') {
                    cowsInBarn++;
                    counter.textContent = `Vacas en el corral: ${cowsInBarn}`;
                    
                    // Verificar si es múltiplo de 10 (excepto 50)
                    if (cowsInBarn % 10 === 0 && cowsInBarn < 50) {
                        const messageIndex = Math.floor(cowsInBarn / 10) - 1;
                        if (messageIndex < milestoneMessages.length) {
                            showMessage(milestoneMessages[messageIndex]);
                        }
                    }
                    
                    // No hay meta de 50, solo contar indefinidamente
                }
                
                animal.remove();
                if (gameActive) createAnimal();
            }, 1000);
        }
        
        // Animal equivocado seleccionado
        function wrongAnimalSelected() {
            playWrongSound();
            
            gameActive = false;
            cowsInBarn = 0;
            counter.textContent = `Vacas en el corral: ${cowsInBarn}`;
            wrongAnimalMessage.style.display = 'block';
            
            // Eliminar todos los animales del pasto
            document.querySelectorAll('.animal').forEach(animal => animal.remove());
        }
        
        // Reiniciar juego completamente
        function restartGame() {
            cowsInBarn = 0;
            counter.textContent = `Vacas en el corral: ${cowsInBarn}`;
            wrongAnimalMessage.style.display = 'none';
            gameActive = true;
            
            // Eliminar todos los animales del pasto
            document.querySelectorAll('.animal').forEach(animal => animal.remove());
            
            // Detener generación automática anterior
            if (spawnInterval) clearInterval(spawnInterval);
            
            // Iniciar generación automática de animales
            const spawnRate = levels[currentLevel].spawnRate;
            spawnInterval = setInterval(() => {
                if (gameActive) {
                    createAnimal();
                }
            }, spawnRate);
            
            // Crear algunos animales iniciales
            for (let i = 0; i < 3; i++) {
                setTimeout(createAnimal, i * 500);
            }
        }
        
        // Continuar juego después de error
        function continueGame() {
            wrongAnimalMessage.style.display = 'none';
            gameActive = true;
            createAnimal();
        }
        
        // No se añaden animales al hacer clic en el cielo (generación automática)
        
        // Event listeners
        restartBtn.addEventListener('click', restartGame);
        continueBtn.addEventListener('click', continueGame);
        
        // Event listeners para botones de nivel
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // Actualizar clase activa
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // Cambiar nivel
                currentLevel = this.dataset.level;
                
                // Si el juego está activo, reiniciar con el nuevo nivel
                if (gameActive) {
                    restartGame();
                }
            });
        });
        
        // Sistema de partículas con líneas de conexión (Constelación morada)
        let particles = [];
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        
        function initParticles() {
            resizeCanvas();
            particles = [];
            const particleCount = 60; // Número de partículas
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5, // Velocidad X muy lenta
                    vy: (Math.random() - 0.5) * 0.5, // Velocidad Y muy lenta
                    size: Math.random() * 2 + 1,
                    color: `hsla(${260 + Math.random() * 40}, 60%, 70%, ${0.3 + Math.random() * 0.4})` // Tonos morados
                });
            }
            
            animateParticles();
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar y actualizar partículas
            particles.forEach(p => {
                // Mover partícula
                p.x += p.vx;
                p.y += p.vy;
                
                // Rebotar en bordes (usando window.innerWidth/Height ya que canvas es fixed)
                if (p.x < 0 || p.x > window.innerWidth) p.vx *= -1;
                if (p.y < 0 || p.y > window.innerHeight) p.vy *= -1;
                
                // Dibujar partícula
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, 0.5)`; // Partículas blancas translúcidas para contraste
                ctx.fill();
            });
            
            // Dibujar líneas de conexión
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 120; // Distancia máxima para conectar
                    
                    if (distance < maxDistance) {
                        const opacity = 1 - (distance / maxDistance);
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(179, 157, 219, ${opacity * 0.3})`; // Líneas moradas translúcidas
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
            
            requestAnimationFrame(animateParticles);
        }
        
        // Redimensionar canvas cuando cambia el tamaño de la ventana
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        
        // Inicializar juego
        createStars();
        createNameStars();
        initParticles();
        restartGame();
        
        // Iniciar mensajes superiores después de un pequeño retraso
        setTimeout(() => {
            scheduleNextMessage();
        }, 5000);
    </script>

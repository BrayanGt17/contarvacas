<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos ByForever</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a0a2e, #2d1b4e);
            font-family: 'Arial', sans-serif;
            color: #e1bee7;
        }
        
        h1 {
            margin: 30px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1000px;
            width: 100%;
        }
        
        .game-card {
            background: rgba(30, 30, 60, 0.8);
            border: 2px solid #7e57c2;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(126, 87, 194, 0.5);
        }
        
        .game-card h2 {
            margin: 10px 0;
            color: #d1c4e9;
        }
        
        .game-card p {
            color: #b39ddb;
            margin-bottom: 15px;
        }
        
        .play-btn {
            background: #4527a0;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }
        
        .play-btn:hover {
            background: #7e57c2;
        }
        
        .icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>🎮 Juegos ByForever 🎮</h1>
    
    <div class="games-grid">
        <div class="game-card">
            <div class="icon">🐄</div>
            <h2>Contar Vacas</h2>
            <p>Toca las vacas para contarlas hasta 50 y dormir</p>
            <a href="contarvacas/" class="play-btn">Jugar</a>
        </div>
        
        <div class="game-card">
            <div class="icon">🏃</div>
            <h2>Dino Vaca</h2>
            <p>Corre y salta obstáculos estilo Chrome Dino</p>
            <a href="dinovaca/" class="play-btn">Jugar</a>
        </div>
    </div>
</body>
</html>

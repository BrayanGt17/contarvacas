<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentos - BYFFOREVER💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff69b4;
            --secondary: #7e57c2;
            --dark: #1a0a2e;
            --darker: #0d0518;
            --light: #e1bee7;
            --accent: #b39ddb;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 50%, var(--darker) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--light);
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            animation: slideDown 0.8s ease-out;
        }

        .logo {
            font-size: 3.5em;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            animation: shimmer 3s linear infinite;
            background-size: 200% auto;
        }

        .tagline {
            color: #b39ddb;
            font-size: 1.1em;
            margin-top: 10px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        /* Sección de agregar cuento */
        .add-section {
            background: linear-gradient(145deg, rgba(40, 40, 80, 0.95), rgba(20, 20, 50, 0.98));
            border: 2px solid rgba(126, 87, 194, 0.4);
            border-radius: 30px;
            padding: 40px;
            margin: 20px 0;
            width: 100%;
            max-width: 600px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 50px rgba(126, 87, 194, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.2s both;
        }

        .add-section h2 {
            color: var(--light);
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b39ddb;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid rgba(126, 87, 194, 0.4);
            border-radius: 15px;
            background: rgba(10, 10, 30, 0.8);
            color: #e1bee7;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 14px 35px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
            text-decoration: none;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.6);
        }

        /* Lista de cuentos */
        .cuentos-list {
            width: 100%;
            max-width: 800px;
            margin: 30px 0;
        }

        .cuentos-list h3 {
            color: var(--light);
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
        }

        .cuento-item {
            background: linear-gradient(145deg, rgba(45, 45, 85, 0.9), rgba(25, 25, 55, 0.95));
            border: 1px solid rgba(126, 87, 194, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .cuento-item:hover {
            transform: translateX(5px);
            border-color: rgba(255, 105, 180, 0.5);
        }

        .cuento-info {
            flex: 1;
        }

        .cuento-title {
            color: #ffd1dc;
            font-size: 1.2em;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .cuento-description {
            color: #b39ddb;
            font-size: 0.9em;
        }

        .cuento-actions {
            display: flex;
            gap: 10px;
        }

        .cuento-actions .btn {
            padding: 10px 20px;
            font-size: 0.85em;
            width: auto;
        }

        /* Back link */
        .back-link {
            display: inline-block;
            margin: 30px 0;
            color: #b39ddb;
            text-decoration: none;
            padding: 12px 30px;
            border: 2px solid rgba(126, 87, 194, 0.5);
            border-radius: 25px;
            transition: all 0.3s;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .back-link:hover {
            background: #7e57c2;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(126, 87, 194, 0.5);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, rgba(0, 200, 83, 0.95), rgba(0, 150, 36, 0.95));
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 200, 83, 0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.95), rgba(198, 40, 40, 0.95));
        }

        /* Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @media (max-width: 768px) {
            .logo { font-size: 2em; }
            .add-section { padding: 25px; }
            .cuento-item { flex-direction: column; text-align: center; }
            .cuento-actions { justify-content: center; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="content">
        <header class="header">
            <h1 class="logo">CUENTOS</h1>
            <p class="tagline">🎵 Colección de Cuentos y Audios 🎵</p>
        </header>

        <!-- Sección para agregar cuentos -->
        <div class="add-section">
            <h2>➕ Agregar Nuevo Cuento</h2>
            <form id="addCuentoForm">
                <div class="form-group">
                    <label for="titulo">Título del cuento</label>
                    <input type="text" id="titulo" placeholder="Ej: La liebre y la tortuga" required>
                </div>
                
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Breve descripción del cuento..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="audioUrl">URL del audio (jsDelivr)</label>
                    <input type="url" id="audioUrl" placeholder="https://cdn.jsdelivr.net/gh/..." required>
                    <small style="color: #9e8ac4; font-size: 0.8em; display: block; margin-top: 8px;">
                        💡 Sube tu audio a la carpeta azafran/cuentos/ y pega la URL de jsDelivr
                    </small>
                </div>
                
                <button type="submit" class="btn">Agregar Cuento</button>
            </form>
        </div>

        <!-- Lista de cuentos -->
        <div class="cuentos-list">
            <h3>📚 Tus Cuentos</h3>
            <div id="cuentosContainer">
                <!-- Los cuentos se cargarán aquí -->
            </div>
        </div>

        <a href="../index.html" class="back-link">← Volver a BYFFOREVER💗</a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Sistema de partículas
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 2 + 0.5,
                    opacity: 0.3 + Math.random() * 0.4
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(179, 157, 219, ${p.opacity})`;
                ctx.fill();
            });
            
            // Draw connections
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 150;
                    
                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(126, 87, 194, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();

        // Lógica de la aplicación de cuentos
        let cuentos = JSON.parse(localStorage.getItem('cuentos')) || [];

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function renderCuentos() {
            const container = document.getElementById('cuentosContainer');
            container.innerHTML = '';
            
            if (cuentos.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #9e8ac4; padding: 30px;">No hay cuentos todavía. ¡Agrega tu primer cuento!</p>';
                return;
            }
            
            cuentos.forEach((cuento, index) => {
                const item = document.createElement('div');
                item.className = 'cuento-item';
                item.innerHTML = `
                    <div class="cuento-info">
                        <div class="cuento-title">${cuento.titulo}</div>
                        <div class="cuento-description">${cuento.descripcion || 'Sin descripción'}</div>
                    </div>
                    <div class="cuento-actions">
                        <a href="${cuento.url}" class="btn" target="_blank">▶️ Escuchar</a>
                        <button class="btn" style="background: linear-gradient(135deg, #ff4757 0%, #c62828 100%);" onclick="eliminarCuento(${index})">🗑️</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function eliminarCuento(index) {
            if (confirm('¿Estás seguro de que quieres eliminar este cuento?')) {
                cuentos.splice(index, 1);
                localStorage.setItem('cuentos', JSON.stringify(cuentos));
                renderCuentos();
                showToast('Cuento eliminado');
            }
        }

        document.getElementById('addCuentoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const titulo = document.getElementById('titulo').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();
            const audioUrl = document.getElementById('audioUrl').value.trim();
            
            if (!titulo || !audioUrl) {
                showToast('Por favor completa todos los campos requeridos', true);
                return;
            }
            
            // Validar URL
            try {
                new URL(audioUrl);
            } catch {
                showToast('Por favor ingresa una URL válida', true);
                return;
            }
            
            // Agregar cuento
            cuentos.push({
                titulo: titulo,
                descripcion: descripcion,
                url: audioUrl
            });
            
            localStorage.setItem('cuentos', JSON.stringify(cuentos));
            renderCuentos();
            
            // Limpiar formulario
            this.reset();
            showToast('¡Cuento agregado exitosamente!');
        });

        // Cargar cuentos al iniciar
        renderCuentos();
    </script>
</body>
</html>

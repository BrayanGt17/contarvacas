<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentos - JuegosBYF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e1bee7;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
        }

        .logo {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(90deg, #b39ddb, #7e57c2, #b39ddb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .tagline {
            color: #b39ddb;
            font-size: 1.1em;
            margin-top: 10px;
        }

        .search-section {
            background: rgba(30, 30, 60, 0.9);
            border: 1px solid rgba(126, 87, 194, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-section input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #7e57c2;
            border-radius: 10px;
            background: rgba(20, 20, 40, 0.8);
            color: #e1bee7;
            font-size: 1em;
        }

        .search-section input:focus {
            outline: none;
            border-color: #b39ddb;
            box-shadow: 0 0 10px rgba(126, 87, 194, 0.3);
        }

        .search-section button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #4527a0 0%, #5e35b1 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .search-section button:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
        }

        .upload-section {
            background: rgba(30, 30, 60, 0.9);
            border: 1px solid rgba(126, 87, 194, 0.5);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            width: 100%;
            max-width: 600px;
        }

        .upload-section h2 {
            color: #d1c4e9;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b39ddb;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #7e57c2;
            border-radius: 10px;
            background: rgba(20, 20, 40, 0.8);
            color: #e1bee7;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #b39ddb;
            box-shadow: 0 0 10px rgba(126, 87, 194, 0.3);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
            width: 100%;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border: 2px dashed #7e57c2;
            border-radius: 10px;
            background: rgba(20, 20, 40, 0.5);
            color: #b39ddb;
            transition: all 0.3s;
        }

        .file-upload:hover .file-upload-label {
            border-color: #b39ddb;
            background: rgba(20, 20, 40, 0.8);
        }

        .btn {
            background: linear-gradient(135deg, #4527a0 0%, #5e35b1 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            display: inline-block;
            text-align: center;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
            transform: scale(1.05);
        }

        .btn:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(126, 87, 194, 0.5);
        }

        .cuentos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin: 20px 0;
        }

        .cuento-card {
            background: linear-gradient(145deg, rgba(30, 30, 60, 0.9), rgba(20, 20, 40, 0.95));
            border: 1px solid rgba(126, 87, 194, 0.5);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }

        .cuento-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(126, 87, 194, 0.3);
        }

        .cuento-title {
            color: #d1c4e9;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .cuento-description {
            color: #b39ddb;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .audio-player {
            width: 100%;
            margin-top: 10px;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #b39ddb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #d1c4e9;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a0a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #7e57c2;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b39ddb;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2em;
            }
            
            .cuentos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="content">
        <header class="header">
            <h1 class="logo">CUENTOS</h1>
            <p class="tagline">🎵 Colección de Cuentos y Audios 🎵</p>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Buscar cuentos por título o autor...">
            <button onclick="searchCuentos()">🔍 Buscar</button>
        </div>

        <div class="upload-section">
            <h2>Subir Nuevo Cuento</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="titulo">Título del cuento</label>
                    <input type="text" id="titulo" placeholder="Ej: El cuento de la vaca" required>
                </div>
                
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Breve descripción del cuento..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Audio del cuento</label>
                    <div class="file-upload">
                        <input type="file" id="audioFile" accept="audio/*" required>
                        <div class="file-upload-label" id="fileLabel">
                            📁 Seleccionar archivo de audio (MP3, WAV, OGG)
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn">Subir Cuento</button>
            </form>
        </div>

        <h2 style="color: #d1c4e9; margin: 20px 0;">Cuentos Clásicos Disponibles</h2>
        
        <div class="cuentos-grid" id="cuentosGrid">
            <!-- Los cuentos se cargarán dinámicamente aquí -->
        </div>

        <a href="../index.html" class="back-link">← Volver a JuegosBYF</a>
    </div>

    <script>
        // Sistema de partículas
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 2 + 0.5,
                    opacity: 0.3 + Math.random() * 0.4
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(179, 157, 219, ${p.opacity})`;
                ctx.fill();
            });
            
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 150;
                    
                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(126, 87, 194, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();

        // Lista de cuentos infantiles originales con más contenido e imágenes
        const cuentosClasicos = [
            {
                title: "La Aventura del Conejito Valiente",
                author: "CuentosBYF",
                description: "Un conejito pequeño que supera sus miedos para salvar a sus amigos del bosque.",
                images: ["🐰", "🌲", "🌊"],
                content: `
                    <p>Había una vez, en un bosque mágico lleno de árboles altos y flores coloridas, un conejito muy pequeño que se llamaba Tito. Tito era tan pequeño que cabía perfectamente en la palma de tu mano. Vivía en una acogedora madriguera bajo un roble gigante.</p>
                    <p>Al conejito Tito le daba mucho miedo la oscuridad. Cuando el sol se ocultaba y la luna aparecía en el cielo, Tito se escondía en su madriguera y no salía hasta que el sol volvía a brillar. Sus amigos del bosque, como el pájaro Pío y la ardilla Suri, siempre intentaban convencerlo de que saliera a jugar por la noche, pero Tito siempre decía "No, tengo miedo".</p>
                    <p>Un día de verano, después de una fuerte tormenta, el río del bosque creció tanto que inundó el camino hacia los árboles más altos donde crecían las deliciosas manzanas. Los animales del bosque estaban muy preocupados porque no podían conseguir comida.</p>
                    <p>El pájaro Pío voló hasta la madriguera de Tito para pedirle ayuda. "¡Tito! ¡Necesitamos tu ayuda! El río está muy alto y no podemos cruzar para llegar a las manzanas". Tito, con mucho miedo, respondió: "Pero... ¿y si me caigo al río? ¡Es tan oscuro y profundo!".</p>
                    <p>Pero Tito vio que sus amigos estaban muy tristes y hambrientos. Con mucho esfuerzo, decidió ayudarles. Recordó que cerca de su madriguera había un viejo tronco caído que cruzaba el río en su punto más angosto. Tito esperó a que la luna saliera brillante y comenzó su misión.</p>
                    <p>Cuando llegó al tronco, vio que estaba resbaladizo por la lluvia. Tito caminó muy despacio, paso a paso, sin mirar hacia abajo. Su corazón latía muy rápido, pero pensaba en sus amigos. Cuando llegó al otro lado, ¡encontró un camino seco que llevaba directamente a los árboles!</p>
                    <p>Los animales celebraron el regreso de Tito con manzanas frescas. Tito aprendió que, aunque se tenga miedo, se puede ser valiente cuando se piensa en ayudar a los demás. Desde ese día, Tito ya no tenía tanto miedo a la oscuridad porque sabía que sus amigos siempre estarían ahí para él.</p>
                    <p>Y así, el conejito valiente vivió muchas más aventuras en el bosque mágico, siempre ayudando a sus amigos y descubriendo que la valentía está dentro de todos nosotros, solo hay que encontrarla.</p>
                `,
                preguntas: [
                    "¿Por qué tenía miedo el conejito Tito?",
                    "¿Qué problema tuvieron los animales del bosque?",
                    "¿Cómo ayudó Tito a sus amigos?",
                    "¿Qué aprendió Tito al final de la historia?"
                ]
            },
            {
                title: "El Misterio de la Mariposa de Colores",
                author: "CuentosBYF",
                description: "Una mariposa que descubre que su verdadera belleza está en hacer felices a los demás.",
                images: ["🦋", "🌸", "☀️"],
                content: `
                    <p>En un hermoso jardín lleno de flores de todos los colores vivía una mariposa llamada Lila. Lila tenía alas de colores increíbles: azul como el cielo, amarillo como el sol, rojo como las rosas y naranja como las naranjas.</p>
                    <p>Aunque muchas personas decían que Lila era la mariposa más bonita del jardín, ella no se sentía feliz. Veía a las flores tan altas y grandiosas, a las abejas tan trabajadoras, y pensaba: "¿Para qué sirve ser bonita si no ayudo a nadie?"</p>
                    <p>Un día de primavera, mientras volaba cerca de una planta alta, vio a una pequeña oruga que estaba intentando llegar a una hoja jugosa. La oruga era muy pequeña y se caía siempre que intentaba subir.</p>
                    <p>Lila se acercó y le dijo: "¡Hola! ¿Necesitas ayuda?" La oruga, muy cansada, asintió con su cabeza. Lila extendió sus coloridas alas y creó un puente suave para que la oruga pudiera subir hasta la hoja más alta. La oruga estaba muy agradecida y le sonrió a Lila.</p>
                    <p>El resto del día, Lila siguió ayudando a otros insectos y animales del jardín. Ayudó a una abeja a encontrar las flores con más polen, guió a una luciérnaga perdida hacia su familia y hasta ayudó a una pequeña hormiga a cruzar un charco de agua.</p>
                    <p>Al final del día, cuando el sol empezó a ponerse, todos los animales del jardín se reunieron alrededor de Lila. Le dijeron: "Gracias, Lila, por ayudarnos a todos. Tu verdadera belleza no está en tus alas de colores, sino en tu gran corazón que ayuda a los demás".</p>
                    <p>Lila finalmente entendió que su verdadera belleza no estaba en sus colores, sino en su capacidad de hacer felices a los demás. Desde ese día, Lila voló por el jardín ayudando a todos los que necesitaban su apoyo.</p>
                `,
                preguntas: [
                    "¿Por qué no se sentía feliz Lila al principio?",
                    "¿Qué animales ayudó Lila durante el día?",
                    "¿Qué le dijeron los otros animales al final del día?",
                    "¿Qué aprendió Lila sobre la verdadera belleza?"
                ]
            },
            {
                title: "El Sueño del Árbol Solitario",
                author: "CuentosBYF",
                description: "Un árbol que descubre su talento musical con la ayuda de sus amigos del bosque.",
                images: ["🌳", "🎵", "🐦"],
                content: `
                    <p>En el corazón del bosque vivía un roble muy alto y muy viejo. Tenía tantos años que ya no recordaba cuándo había empezado a crecer. Todos los días, el roble veía pasar a los animales del bosque, a los pájaros que cantaban en sus ramas y a las ardillas que saltaban de rama en rama.</p>
                    <p>Pero el roble siempre tenía un sueño secreto: quería cantar. Veía a los pájaros cantar tan bonito y pensaba: "¡Qué lindo sería si yo también pudiera cantar!". Pero los árboles no pueden cantar, pensaba el roble tristemente.</p>
                    <p>Un día de otoño, un grupo de pájaros se posó en sus ramas. Empezaron a cantar una hermosa melodía. El viento sopló suavemente entre las hojas del roble, y de repente... ¡las hojas empezaron a moverse al ritmo de la canción!</p>
                    <p>¡CRAC! ¡CRAC! ¡CRAC! Las hojas del roble hacían un sonido rítmico como si fueran castañuelas. Los pájaros se sorprendieron y miraron al roble. "¡Oye, roble! ¡Tú también estás cantando con nosotros!"</p>
                    <p>El roble no podía creerlo. Por primera vez en su vida, ¡estaba cantando! Sus hojas hacían música con el viento. Los pájaros animaron al roble a seguir cantando, y pronto todos los animales del bosque se acercaron a escuchar.</p>
                    <p>El roble aprendió que todos tenemos un talento especial, aunque a veces no lo descubramos al principio. Desde ese día, el roble se convirtió en el músico del bosque, y todos los animales venían a escuchar su música cada vez que el viento soplaba entre sus hojas.</p>
                `,
                preguntas: [
                    "¿Qué sueño tenía el roble?",
                    "¿Cómo empezó el roble a cantar?",
                    "¿Cómo reaccionaron los animales cuando escucharon al roble?",
                    "¿Qué aprendió el roble sobre sí mismo?"
                ]
            }
        ];

        function displayCuentos(cuentos) {
            const grid = document.getElementById('cuentosGrid');
            grid.innerHTML = '';
            
            if (cuentos.length === 0) {
                grid.innerHTML = `
                    <div class="cuento-card">
                        <h3 class="cuento-title">No se encontraron resultados</h3>
                        <p class="cuento-description">Intenta con otro término de búsqueda</p>
                    </div>
                `;
                return;
            }
            
            cuentos.forEach((cuento, index) => {
                const card = document.createElement('div');
                card.className = 'cuento-card';
                card.dataset.index = index;
                
                // Mostrar miniaturas de las imágenes
                const imagesHtml = cuento.images.map(img => 
                    `<span style="font-size: 1.5em; margin: 0 5px;">${img}</span>`
                ).join('');
                
                card.innerHTML = `
                    <div style="text-align: center; margin-bottom: 10px;">
                        ${imagesHtml}
                    </div>
                    <h3 class="cuento-title">${cuento.title}</h3>
                    <p class="cuento-description">${cuento.description}</p>
                    <p class="cuento-author" style="color: #b39ddb; font-size: 0.9em; margin-bottom: 15px;">
                        ✍️ ${cuento.author}
                    </p>
                    <button class="btn" onclick="mostrarCuento(${index})">
                        📖 Leer cuento
                    </button>
                `;
                
                grid.appendChild(card);
            });
        }

        // Modal para mostrar el cuento completo
        let cuentoModal = null;

        function crearModal() {
            cuentoModal = document.createElement('div');
            cuentoModal.id = 'cuentoModal';
            cuentoModal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                z-index: 1000;
                display: none;
                justify-content: center;
                align-items: center;
                padding: 20px;
                overflow-y: auto;
            `;
            
            cuentoModal.innerHTML = `
                <div style="
                    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
                    border: 2px solid #7e57c2;
                    border-radius: 20px;
                    padding: 30px;
                    max-width: 600px;
                    width: 100%;
                    max-height: 90vh;
                    overflow-y: auto;
                    position: relative;
                ">
                    <button onclick="cerrarModal()" style="
                        position: absolute;
                        top: 15px;
                        right: 15px;
                        background: rgba(255,255,255,0.2);
                        border: none;
                        color: white;
                        width: 35px;
                        height: 35px;
                        border-radius: 50%;
                        cursor: pointer;
                        font-size: 1.2em;
                    ">✕</button>
                    <div id="modalContent"></div>
                </div>
            `;
            
            document.body.appendChild(cuentoModal);
        }

        function mostrarCuento(index) {
            if (!cuentoModal) crearModal();
            
            const cuento = cuentosClasicos[index];
            const modalContent = document.getElementById('modalContent');
            
            // Mostrar imágenes del cuento
            const imagesHtml = cuento.images.map((img, i) => `
                <div style="
                    background: linear-gradient(135deg, rgba(126, 87, 194, 0.3), rgba(74, 39, 160, 0.3));
                    border-radius: 15px;
                    padding: 20px;
                    margin: 10px 0;
                    text-align: center;
                ">
                    <span style="font-size: 5em;">${img}</span>
                    <p style="color: #b39ddb; margin-top: 10px;">Ilustración ${i + 1}</p>
                </div>
            `).join('');
            
            // Mostrar preguntas
            const preguntasHtml = cuento.preguntas ? `
                <div style="
                    background: rgba(126, 87, 194, 0.2);
                    border-radius: 15px;
                    padding: 20px;
                    margin-top: 20px;
                ">
                    <h3 style="color: #e1bee7; margin-bottom: 15px;">💭 Preguntas para pensar</h3>
                    <ul style="list-style: none; padding: 0;">
                        ${cuento.preguntas.map(p => `
                            <li style="
                                color: #d1c4e9;
                                padding: 10px 0;
                                border-bottom: 1px solid rgba(126, 87, 194, 0.3);
                            ">
                                ❓ ${p}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            ` : '';
            
            modalContent.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    ${imagesHtml}
                </div>
                <h2 style="color: #e1bee7; text-align: center; margin-bottom: 10px;">${cuento.title}</h2>
                <p style="color: #b39ddb; text-align: center; margin-bottom: 20px;">Por ${cuento.author}</p>
                <div style="
                    background: rgba(0,0,0,0.3);
                    padding: 25px;
                    border-radius: 15px;
                    line-height: 1.9;
                    color: #d1c4e9;
                    text-align: justify;
                    font-size: 1.1em;
                ">
                    ${cuento.content}
                </div>
                ${preguntasHtml}
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn" onclick="cerrarModal()">Cerrar</button>
                </div>
            `;
            
            cuentoModal.style.display = 'flex';
        }

        function cerrarModal() {
            if (cuentoModal) {
                cuentoModal.style.display = 'none';
            }
        }

        // Cerrar modal con la tecla Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && cuentoModal) {
                cerrarModal();
            }
        });

        function searchCuentos() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!searchTerm) {
                displayCuentos(cuentosClasicos);
                return;
            }
            
            const resultados = cuentosClasicos.filter(cuento => 
                cuento.title.toLowerCase().includes(searchTerm) ||
                cuento.author.toLowerCase().includes(searchTerm) ||
                cuento.description.toLowerCase().includes(searchTerm)
            );
            
            displayCuentos(resultados);
        }

        // Buscar al presionar Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCuentos();
            }
        });

        // Cargar cuentos al iniciar
        displayCuentos(cuentosClasicos);

        // Manejo del formulario de subida
        document.getElementById('audioFile').addEventListener('change', function(e) {
            const label = document.getElementById('fileLabel');
            if (this.files.length > 0) {
                label.textContent = '✓ ' + this.files[0].name;
            } else {
                label.textContent = '📁 Seleccionar archivo de audio (MP3, WAV, OGG)';
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const titulo = document.getElementById('titulo').value;
            const descripcion = document.getElementById('descripcion').value;
            const audioFile = document.getElementById('audioFile').files[0];
            
            if (audioFile) {
                // Crear URL temporal para el audio
                const audioUrl = URL.createObjectURL(audioFile);
                
                // Crear nueva tarjeta de cuento
                const cuentoCard = document.createElement('div');
                cuentoCard.className = 'cuento-card';
                cuentoCard.innerHTML = `
                    <h3 class="cuento-title">${titulo}</h3>
                    <p class="cuento-description">${descripcion || 'Sin descripción'}</p>
                    <div class="audio-player">
                        <audio controls>
                            <source src="${audioUrl}" type="${audioFile.type}">
                            Tu navegador no soporta el elemento de audio.
                        </audio>
                    </div>
                `;
                
                // Agregar al grid
                const grid = document.getElementById('cuentosGrid');
                grid.insertBefore(cuentoCard, grid.firstChild);
                
                // Limpiar formulario
                this.reset();
                document.getElementById('fileLabel').textContent = '📁 Seleccionar archivo de audio (MP3, WAV, OGG)';
                
                alert('¡Cuento subido exitosamente!');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentos - BYFFOREVER💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e1bee7;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            animation: slideDown 0.8s ease-out;
        }

        .logo {
            font-size: 3.5em;
            font-weight: 800;
            background: linear-gradient(90deg, #ff69b4, #7e57c2, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            animation: shimmer 3s linear infinite;
            background-size: 200% auto;
        }

        .tagline {
            color: #b39ddb;
            font-size: 1.1em;
            margin-top: 10px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        /* Sección de "En Construcción" */
        .construction-section {
            background: linear-gradient(145deg, rgba(40, 40, 80, 0.95), rgba(20, 20, 50, 0.98));
            border: 2px solid rgba(126, 87, 194, 0.4);
            border-radius: 30px;
            padding: 60px 50px;
            margin: 20px 0;
            width: 100%;
            max-width: 600px;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 50px rgba(126, 87, 194, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) 0.2s both;
            text-align: center;
        }

        .construction-icon {
            font-size: 5em;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        .construction-title {
            font-size: 2em;
            color: #ff69b4;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .construction-text {
            color: #b39ddb;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Back link */
        .back-link {
            display: inline-block;
            margin: 30px 0;
            color: #b39ddb;
            text-decoration: none;
            padding: 12px 30px;
            border: 2px solid rgba(126, 87, 194, 0.5);
            border-radius: 25px;
            transition: all 0.3s;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .back-link:hover {
            background: #7e57c2;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(126, 87, 194, 0.5);
        }

        /* Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            .logo { font-size: 2em; }
            .construction-section { padding: 40px 30px; }
            .construction-icon { font-size: 4em; }
            .construction-title { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="content">
        <header class="header">
            <h1 class="logo">CUENTOS</h1>
            <p class="tagline">🎵 Colección de Cuentos y Audios 🎵</p>
        </header>

        <div class="construction-section">
            <div class="construction-icon">🚧</div>
            <h2 class="construction-title">EN CONSTRUCCIÓN</h2>
            <p class="construction-text">
                Estamos trabajando para traerte la mejor experiencia de audios y cuentos.<br>
                ¡Vuelve pronto para disfrutar de nuestra colección!
            </p>
        </div>

        <a href="../index.html" class="back-link">← Volver a BYFFOREVER💗</a>
    </div>

    <script>
        // Sistema de partículas simple
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 2 + 0.5,
                    opacity: 0.3 + Math.random() * 0.4
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(179, 157, 219, ${p.opacity})`;
                ctx.fill();
            });
            
            // Draw connections
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 150;
                    
                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(126, 87, 194, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentos - BYFFOREVER💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff69b4;
            --secondary: #7e57c2;
            --dark: #1a0a2e;
            --darker: #0d0518;
            --light: #e1bee7;
            --accent: #b39ddb;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 50%, var(--darker) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--light);
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            animation: slideDown 0.8s ease-out;
        }

        .logo {
            font-size: 3.5em;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            animation: shimmer 3s linear infinite;
            background-size: 200% auto;
        }

        .tagline {
            color: #b39ddb;
            font-size: 1.1em;
            margin-top: 10px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        /* Lista de cuentos */
        .cuentos-list {
            width: 100%;
            max-width: 800px;
            margin: 30px 0;
        }

        .cuentos-list h3 {
            color: var(--light);
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
        }

        .cuento-item {
            background: linear-gradient(145deg, rgba(45, 45, 85, 0.9), rgba(25, 25, 55, 0.95));
            border: 1px solid rgba(126, 87, 194, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .cuento-item:hover {
            transform: translateX(5px);
            border-color: rgba(255, 105, 180, 0.5);
        }

        .cuento-info {
            flex: 1;
        }

        .cuento-title {
            color: #ffd1dc;
            font-size: 1.2em;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .cuento-description {
            color: #b39ddb;
            font-size: 0.9em;
        }

        .cuento-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
        }

        /* Back link */
        .back-link {
            display: inline-block;
            margin: 30px 0;
            color: #b39ddb;
            text-decoration: none;
            padding: 12px 30px;
            border: 2px solid rgba(126, 87, 194, 0.5);
            border-radius: 25px;
            transition: all 0.3s;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .back-link:hover {
            background: #7e57c2;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(126, 87, 194, 0.5);
        }

        /* Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @media (max-width: 768px) {
            .logo { font-size: 2em; }
            .cuento-item { flex-direction: column; text-align: center; }
            .cuento-actions { justify-content: center; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="content">
        <header class="header">
            <h1 class="logo">CUENTOS</h1>
            <p class="tagline">🎵 Colección de Cuentos y Audios 🎵</p>
        </header>

        <!-- Lista de cuentos -->
        <div class="cuentos-list">
            <h3>📚 Tus Cuentos</h3>
            <div id="cuentosContainer">
                <!-- Los cuentos se cargarán aquí -->
            </div>
        </div>

        <a href="../index.html" class="back-link">← Volver a BYFFOREVER💗</a>
    </div>

    <script>
        // Sistema de partículas
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 2 + 0.5,
                    opacity: 0.3 + Math.random() * 0.4
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(179, 157, 219, ${p.opacity})`;
                ctx.fill();
            });
            
            // Draw connections
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 150;
                    
                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(126, 87, 194, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();

        // Cuentos hardcoded para reproducción
        const cuentos = [
            {
                titulo: "Cuento 1",
                descripcion: "Primer cuento de la colección",
                url: "https://cdn.jsdelivr.net/gh/BrayanGt17/contarvacas@main/azafran/cuentos/Cuento1.m4a"
            },
            {
                titulo: "Cuento 2",
                descripcion: "Segundo cuento de la colección",
                url: "https://cdn.jsdelivr.net/gh/BrayanGt17/contarvacas@main/azafran/cuentos/cuento2.mp3"
            }
        ];

        function renderCuentos() {
            const container = document.getElementById('cuentosContainer');
            container.innerHTML = '';
            
            if (cuentos.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #9e8ac4; padding: 30px;">No hay cuentos disponibles.</p>';
                return;
            }
            
            cuentos.forEach((cuento, index) => {
                const item = document.createElement('div');
                item.className = 'cuento-item';
                item.innerHTML = `
                    <div class="cuento-info">
                        <div class="cuento-title">${cuento.titulo}</div>
                        <div class="cuento-description">${cuento.descripcion || ''}</div>
                    </div>
                    <div class="cuento-actions">
                        <a href="${cuento.url}" class="btn" target="_blank">▶️ Escuchar</a>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Cargar cuentos al iniciar
        renderCuentos();
    </script>
</body>
</html>

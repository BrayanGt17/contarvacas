<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentos - JuegosBYF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e1bee7;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .construction-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px;
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        .gear {
            font-size: 6rem;
            display: inline-block;
            animation: rotate 4s linear infinite;
            filter: drop-shadow(0 0 20px rgba(126, 87, 194, 0.5));
        }

        .gear-reverse {
            animation-direction: reverse;
            font-size: 4rem;
            margin-left: -20px;
            margin-top: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 20px 0;
            background: linear-gradient(90deg, #ff69b4, #7e57c2, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2s linear infinite;
            background-size: 200% auto;
        }

        p {
            font-size: 1.2rem;
            color: #b39ddb;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .progress-bar {
            width: 100%;
            max-width: 300px;
            height: 6px;
            background: rgba(126, 87, 194, 0.3);
            border-radius: 3px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff69b4, #7e57c2);
            border-radius: 3px;
            animation: progress 2s ease-in-out infinite;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #b39ddb;
            text-decoration: none;
            padding: 12px 30px;
            border: 2px solid #7e57c2;
            border-radius: 25px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: #7e57c2;
            color: white;
            transform: scale(1.05);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="construction-container">
        <div class="gear">⚙️</div>
        <div class="gear gear-reverse">⚙️</div>
        
        <h1>En Construcción</h1>
        
        <p>
            Estamos trabajando arduamente para traerte la mejor experiencia de audios.<br>
            Pronto podrás grabar y subir tus propios cuentos directamente aquí.
        </p>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <p class="pulse">⏱️ Próximamente...</p>
        
        <a href="../index.html" class="back-link">← Volver a JuegosBYF</a>
    </div>

    <script>
        // Sistema de partículas mejorado
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(100, Math.floor(window.innerWidth / 10));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    size: Math.random() * 3 + 1,
                    opacity: Math.random() * 0.5 + 0.2,
                    color: Math.random() > 0.5 ? '#7e57c2' : '#ff69b4'
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            
            // Draw connections
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(126, 87, 194, ${0.2 * (1 - distance/120)})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();
    </script>
</body>
</html>

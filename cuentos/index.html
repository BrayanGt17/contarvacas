<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentos - JuegosBYF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e1bee7;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
        }

        .logo {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(90deg, #b39ddb, #7e57c2, #b39ddb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .tagline {
            color: #b39ddb;
            font-size: 1.1em;
            margin-top: 10px;
        }

        .search-section {
            background: rgba(30, 30, 60, 0.9);
            border: 1px solid rgba(126, 87, 194, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-section input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #7e57c2;
            border-radius: 10px;
            background: rgba(20, 20, 40, 0.8);
            color: #e1bee7;
            font-size: 1em;
        }

        .search-section input:focus {
            outline: none;
            border-color: #b39ddb;
            box-shadow: 0 0 10px rgba(126, 87, 194, 0.3);
        }

        .search-section button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #4527a0 0%, #5e35b1 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .search-section button:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
        }

        .upload-section {
            background: rgba(30, 30, 60, 0.9);
            border: 1px solid rgba(126, 87, 194, 0.5);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            width: 100%;
            max-width: 600px;
        }

        .upload-section h2 {
            color: #d1c4e9;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b39ddb;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #7e57c2;
            border-radius: 10px;
            background: rgba(20, 20, 40, 0.8);
            color: #e1bee7;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #b39ddb;
            box-shadow: 0 0 10px rgba(126, 87, 194, 0.3);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
            width: 100%;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border: 2px dashed #7e57c2;
            border-radius: 10px;
            background: rgba(20, 20, 40, 0.5);
            color: #b39ddb;
            transition: all 0.3s;
        }

        .file-upload:hover .file-upload-label {
            border-color: #b39ddb;
            background: rgba(20, 20, 40, 0.8);
        }

        .btn {
            background: linear-gradient(135deg, #4527a0 0%, #5e35b1 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            display: inline-block;
            text-align: center;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
            transform: scale(1.05);
        }

        .btn:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(126, 87, 194, 0.5);
        }

        .cuentos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin: 20px 0;
        }

        .cuento-card {
            background: linear-gradient(145deg, rgba(30, 30, 60, 0.9), rgba(20, 20, 40, 0.95));
            border: 1px solid rgba(126, 87, 194, 0.5);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }

        .cuento-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(126, 87, 194, 0.3);
        }

        .cuento-title {
            color: #d1c4e9;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .cuento-description {
            color: #b39ddb;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .audio-player {
            width: 100%;
            margin-top: 10px;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #b39ddb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #d1c4e9;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2em;
            }
            
            .cuentos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="content">
        <header class="header">
            <h1 class="logo">CUENTOS</h1>
            <p class="tagline">🎵 Colección de Cuentos y Audios 🎵</p>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Buscar cuentos por título o autor...">
            <button onclick="searchCuentos()">🔍 Buscar</button>
        </div>

        <div class="upload-section">
            <h2>Subir Nuevo Cuento</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="titulo">Título del cuento</label>
                    <input type="text" id="titulo" placeholder="Ej: El cuento de la vaca" required>
                </div>
                
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Breve descripción del cuento..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Audio del cuento</label>
                    <div class="file-upload">
                        <input type="file" id="audioFile" accept="audio/*" required>
                        <div class="file-upload-label" id="fileLabel">
                            📁 Seleccionar archivo de audio (MP3, WAV, OGG)
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn">Subir Cuento</button>
            </form>
        </div>

        <h2 style="color: #d1c4e9; margin: 20px 0;">Cuentos Clásicos Disponibles</h2>
        
        <div class="cuentos-grid" id="cuentosGrid">
            <!-- Los cuentos se cargarán dinámicamente aquí -->
        </div>

        <a href="../index.html" class="back-link">← Volver a JuegosBYF</a>
    </div>

    <script>
        // Sistema de partículas
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 2 + 0.5,
                    opacity: 0.3 + Math.random() * 0.4
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(179, 157, 219, ${p.opacity})`;
                ctx.fill();
            });
            
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 150;
                    
                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(126, 87, 194, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();

        // Lista de cuentos infantiles originales (creados para esta web)
        const cuentosClasicos = [
            {
                title: "El conejito valiente",
                author: "CuentosBYF",
                description: "Un pequeño conejo que supera sus miedos para ayudar a sus amigos del bosque. Una historia sobre el valor y la amistad.",
                content: "Había una vez un conejito muy pequeño llamado Tito que vivía en un bosque mágico. A Tito le daba mucho miedo la oscuridad y nunca salía de su madriguera después de que se pusiera el sol. Un día, sus amigos del bosque le pidieron ayuda porque el río había crecido demasiado y no podían cruzar para llegar a los árboles con frutas. Tito, aunque tenía miedo, decidió ayudarles. Con mucho esfuerzo y valentía, encontró un camino seguro para cruzar el río. Al final, todos sus amigos celebraron su valentía y Tito aprendió que, aunque se tenga miedo, se puede ser valiente por los demás.",
                image: "🐰"
            },
            {
                title: "La mariposa de colores",
                author: "CuentosBYF",
                description: "Una mariposa que descubre que su verdadera belleza está en ayudar a los demás.",
                content: "En un jardín lleno de flores vivía una mariposa llamada Lila. Lila tenía alas de todos los colores del arcoíris, pero siempre se sentía triste porque pensaba que era demasiado pequeña para importar. Un día, vio a una pequeña oruga que no podía llegar a una hoja alta. Lila, usando sus alas coloridas, la ayudó a subir. Luego ayudó a una abeja a encontrar polen y a una luciérnaga a brillar más fuerte. Pronto, todos los animales del jardín le agradecieron y Lila entendió que su verdadera belleza estaba en ayudar a los demás.",
                image: "🦋"
            },
            {
                title: "El árbol que quería cantar",
                author: "CuentosBYF",
                description: "Un árbol que descubre su talento para la música con la ayuda de sus amigos.",
                content: "En el centro del bosque vivía un roble muy alto que siempre deseaba cantar. Pero los árboles no pueden cantar, pensaba el roble. Un día, un grupo de pájaros llegó y empezó a cantar en sus ramas. El roble sintió el ritmo en sus hojas y empezó a moverse con el viento. De repente, sus hojas hicieron un sonido como música. Los pájaros se sorprendieron y animaron al roble a seguir. Con el tiempo, todos los animales del bosque venían a escuchar la música del roble que cantaba con el viento.",
                image: "🌳"
            },
            {
                title: "La pequeña estrella",
                author: "CuentosBYF",
                description: "Una estrella que quiere brillar más fuerte y descubre su verdadero propósito.",
                content: "En el cielo nocturno, una pequeña estrella llamada Stella se sentía insignificante porque las otras estrellas eran más grandes y brillantes. Stella deseaba brillar más fuerte para que la vieran. Una noche, vio a un niño perdido en el bosque que tenía miedo de la oscuridad. Stella decidió brillar tan fuerte como pudo para guiar al niño hacia su casa. El niño vio su luz y siguió hasta llegar a salvo. Stella aprendió que su verdadero brillo estaba en ayudar a los demás.",
                image: "⭐"
            },
            {
                title: "El delfín aventurero",
                author: "CuentosBYF",
                description: "Un delfín que descubre nuevos lugares y hace amigos en el océano.",
                content: "En el vasto océano vivía un delfín llamado Delfín que siempre quería explorar lugares nuevos. Un día, decidió nadar más allá de su laguna y descubrió una cueva submarina llena de peces de colores. Dentro de la cueva, conoció a una tortuga sabia que le enseñó sobre las corrientes del océano. Delfín aprendió a navegar por las aguas y ayudó a otros animales marinos a encontrar su camino. Se convirtió en el mejor explorador del océano.",
                image: "🐬"
            },
            {
                title: "El gatito curioso",
                author: "CuentosBYF",
                description: "Un gatito que aprende a ser más cuidadoso mientras explora su jardín.",
                content: "Mishi era un gatito muy curioso que vivía en una casita con un gran jardín. Un día, vio una mariposa colorida y decidió seguirla. Pasó por entre las flores, trepó a un árbol y llegó hasta la cerca del jardín. Pero mientras perseguía la mariposa, casi cae de la cerca. Su mamá lo salvó y le enseñó que la curiosidad es buena, pero siempre hay que tener cuidado. Mishi aprendió a explorar con más precaución y se convirtió en el mejor explorador del jardín.",
                image: "🐱"
            },
            {
                title: "El pajarito cantor",
                author: "CuentosBYF",
                description: "Un pajarito que aprende que su canto puede alegrar a todos.",
                content: "Pio era un pajarito pequeño que tenía un hermoso canto, pero siempre tenía miedo de cantar delante de otros animales. Un día, vio a todos sus amigos tristes porque el sol estaba cubierto por nubes. Pio decidió cantar su canción más alegre. Su canto era tan bonito que todos los animales se alegraron y el sol empezó a salir de entre las nubes. Pio aprendió que su canto tenía el poder de alegrar a todos.",
                image: "🐦"
            },
            {
                title: "El oso que quería ser amigo",
                author: "CuentosBYF",
                description: "Un oso que descubre cómo hacer amigos en el bosque.",
                content: "Paco era un oso grande que siempre se sentía solo porque los otros animales le tenían miedo. Un día, vio a un grupo de conejitos que estaban asustados por una tormenta. Paco, con mucho cuidado, se acercó y los protegió bajo su peludo cuerpo. Los conejitos vieron que Paco era amable y se hicieron sus amigos. Pronto, todos los animales del bosque querían ser amigos de Paco.",
                image: "🐻"
            },
            {
                title: "La hada de las flores",
                author: "CuentosBYF",
                description: "Un hada que cuida las flores del jardín y aprende sobre la naturaleza.",
                content: "Flora era una hada diminuta que vivía en un jardín lleno de flores. Cada mañana, ella regaba todas las flores con su varita mágica. Pero un día, una flor muy especial no quería abrirse. Flora la visitó todos los días, le cantaba canciones y le contaba historias. Después de una semana, la flor finalmente abrió sus pétalos y reveló una belleza que nunca antes se había visto. Flora aprendió que la paciencia y el cuidado hacen florecer lo más hermoso.",
                image: "🧚"
            },
            {
                title: "El pequeño dragón",
                author: "CuentosBYF",
                description: "Un dragón que descubre que no todos los dragones son malvados.",
                content: "Drake era un pequeño dragón que vivía en una montaña. Todos decían que los dragones eran malvados, pero Drake solo quería ser amable. Un día, vio a un pastor perdido con su rebaño. Drake los guio de regreso a su aldea usando su fuego para iluminar el camino. El pastor y los aldeanos vieron que Drake era bueno y lo invitaron a vivir con ellos. Drake aprendió que las apariencias no siempre son la verdad.",
                image: "🐉"
            }
        ];

        function displayCuentos(cuentos) {
            const grid = document.getElementById('cuentosGrid');
            grid.innerHTML = '';
            
            if (cuentos.length === 0) {
                grid.innerHTML = `
                    <div class="cuento-card">
                        <h3 class="cuento-title">No se encontraron resultados</h3>
                        <p class="cuento-description">Intenta con otro término de búsqueda</p>
                    </div>
                `;
                return;
            }
            
            cuentos.forEach((cuento, index) => {
                const card = document.createElement('div');
                card.className = 'cuento-card';
                card.dataset.index = index;
                
                card.innerHTML = `
                    <div style="font-size: 3em; text-align: center; margin-bottom: 10px;">${cuento.image}</div>
                    <h3 class="cuento-title">${cuento.title}</h3>
                    <p class="cuento-description">${cuento.description}</p>
                    <p class="cuento-author" style="color: #b39ddb; font-size: 0.9em; margin-bottom: 15px;">
                        ✍️ ${cuento.author}
                    </p>
                    <button class="btn" onclick="mostrarCuento(${index})">
                        📖 Leer cuento
                    </button>
                `;
                
                grid.appendChild(card);
            });
        }

        // Modal para mostrar el cuento completo
        let cuentoModal = null;

        function crearModal() {
            cuentoModal = document.createElement('div');
            cuentoModal.id = 'cuentoModal';
            cuentoModal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                z-index: 1000;
                display: none;
                justify-content: center;
                align-items: center;
                padding: 20px;
                overflow-y: auto;
            `;
            
            cuentoModal.innerHTML = `
                <div style="
                    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
                    border: 2px solid #7e57c2;
                    border-radius: 20px;
                    padding: 30px;
                    max-width: 600px;
                    width: 100%;
                    max-height: 90vh;
                    overflow-y: auto;
                    position: relative;
                ">
                    <button onclick="cerrarModal()" style="
                        position: absolute;
                        top: 15px;
                        right: 15px;
                        background: rgba(255,255,255,0.2);
                        border: none;
                        color: white;
                        width: 35px;
                        height: 35px;
                        border-radius: 50%;
                        cursor: pointer;
                        font-size: 1.2em;
                    ">✕</button>
                    <div id="modalContent"></div>
                </div>
            `;
            
            document.body.appendChild(cuentoModal);
        }

        function mostrarCuento(index) {
            if (!cuentoModal) crearModal();
            
            const cuento = cuentosClasicos[index];
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div style="text-align: center; font-size: 4em; margin-bottom: 20px;">${cuento.image}</div>
                <h2 style="color: #e1bee7; text-align: center; margin-bottom: 10px;">${cuento.title}</h2>
                <p style="color: #b39ddb; text-align: center; margin-bottom: 20px;">Por ${cuento.author}</p>
                <div style="
                    background: rgba(0,0,0,0.3);
                    padding: 20px;
                    border-radius: 15px;
                    line-height: 1.8;
                    color: #d1c4e9;
                    text-align: justify;
                ">
                    ${cuento.content}
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn" onclick="cerrarModal()">Cerrar</button>
                </div>
            `;
            
            cuentoModal.style.display = 'flex';
        }

        function cerrarModal() {
            if (cuentoModal) {
                cuentoModal.style.display = 'none';
            }
        }

        // Cerrar modal con la tecla Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && cuentoModal) {
                cerrarModal();
            }
        });

        function searchCuentos() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!searchTerm) {
                displayCuentos(cuentosClasicos);
                return;
            }
            
            const resultados = cuentosClasicos.filter(cuento => 
                cuento.title.toLowerCase().includes(searchTerm) ||
                cuento.author.toLowerCase().includes(searchTerm) ||
                cuento.description.toLowerCase().includes(searchTerm)
            );
            
            displayCuentos(resultados);
        }

        // Buscar al presionar Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCuentos();
            }
        });

        // Cargar cuentos al iniciar
        displayCuentos(cuentosClasicos);

        // Manejo del formulario de subida
        document.getElementById('audioFile').addEventListener('change', function(e) {
            const label = document.getElementById('fileLabel');
            if (this.files.length > 0) {
                label.textContent = '✓ ' + this.files[0].name;
            } else {
                label.textContent = '📁 Seleccionar archivo de audio (MP3, WAV, OGG)';
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const titulo = document.getElementById('titulo').value;
            const descripcion = document.getElementById('descripcion').value;
            const audioFile = document.getElementById('audioFile').files[0];
            
            if (audioFile) {
                // Crear URL temporal para el audio
                const audioUrl = URL.createObjectURL(audioFile);
                
                // Crear nueva tarjeta de cuento
                const cuentoCard = document.createElement('div');
                cuentoCard.className = 'cuento-card';
                cuentoCard.innerHTML = `
                    <h3 class="cuento-title">${titulo}</h3>
                    <p class="cuento-description">${descripcion || 'Sin descripción'}</p>
                    <div class="audio-player">
                        <audio controls>
                            <source src="${audioUrl}" type="${audioFile.type}">
                            Tu navegador no soporta el elemento de audio.
                        </audio>
                    </div>
                `;
                
                // Agregar al grid
                const grid = document.getElementById('cuentosGrid');
                grid.insertBefore(cuentoCard, grid.firstChild);
                
                // Limpiar formulario
                this.reset();
                document.getElementById('fileLabel').textContent = '📁 Seleccionar archivo de audio (MP3, WAV, OGG)';
                
                alert('¡Cuento subido exitosamente!');
            }
        });
    </script>
</body>
</html>

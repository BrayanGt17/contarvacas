<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentos - JuegosBYF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e1bee7;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
        }

        .logo {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(90deg, #b39ddb, #7e57c2, #b39ddb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .tagline {
            color: #b39ddb;
            font-size: 1.1em;
            margin-top: 10px;
        }

        .search-section {
            background: rgba(30, 30, 60, 0.9);
            border: 1px solid rgba(126, 87, 194, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-section input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #7e57c2;
            border-radius: 10px;
            background: rgba(20, 20, 40, 0.8);
            color: #e1bee7;
            font-size: 1em;
        }

        .search-section input:focus {
            outline: none;
            border-color: #b39ddb;
            box-shadow: 0 0 10px rgba(126, 87, 194, 0.3);
        }

        .search-section button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #4527a0 0%, #5e35b1 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .search-section button:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
        }

        .upload-section {
            background: rgba(30, 30, 60, 0.9);
            border: 1px solid rgba(126, 87, 194, 0.5);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            width: 100%;
            max-width: 600px;
        }

        .upload-section h2 {
            color: #d1c4e9;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b39ddb;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #7e57c2;
            border-radius: 10px;
            background: rgba(20, 20, 40, 0.8);
            color: #e1bee7;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #b39ddb;
            box-shadow: 0 0 10px rgba(126, 87, 194, 0.3);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            cursor: pointer;
            width: 100%;
        }

        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border: 2px dashed #7e57c2;
            border-radius: 10px;
            background: rgba(20, 20, 40, 0.5);
            color: #b39ddb;
            transition: all 0.3s;
        }

        .file-upload:hover .file-upload-label {
            border-color: #b39ddb;
            background: rgba(20, 20, 40, 0.8);
        }

        .btn {
            background: linear-gradient(135deg, #4527a0 0%, #5e35b1 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            display: inline-block;
            text-align: center;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
            transform: scale(1.05);
        }

        .btn:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(126, 87, 194, 0.5);
        }

        .cuentos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin: 20px 0;
        }

        .cuento-card {
            background: linear-gradient(145deg, rgba(30, 30, 60, 0.9), rgba(20, 20, 40, 0.95));
            border: 1px solid rgba(126, 87, 194, 0.5);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }

        .cuento-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(126, 87, 194, 0.3);
        }

        .cuento-title {
            color: #d1c4e9;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .cuento-description {
            color: #b39ddb;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .audio-player {
            width: 100%;
            margin-top: 10px;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #b39ddb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #d1c4e9;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2em;
            }
            
            .cuentos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="content">
        <header class="header">
            <h1 class="logo">CUENTOS</h1>
            <p class="tagline">🎵 Colección de Cuentos y Audios 🎵</p>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Buscar cuentos por título o autor...">
            <button onclick="searchCuentos()">🔍 Buscar</button>
        </div>

        <div class="upload-section">
            <h2>Subir Nuevo Cuento</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="titulo">Título del cuento</label>
                    <input type="text" id="titulo" placeholder="Ej: El cuento de la vaca" required>
                </div>
                
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Breve descripción del cuento..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Audio del cuento</label>
                    <div class="file-upload">
                        <input type="file" id="audioFile" accept="audio/*" required>
                        <div class="file-upload-label" id="fileLabel">
                            📁 Seleccionar archivo de audio (MP3, WAV, OGG)
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn">Subir Cuento</button>
            </form>
        </div>

        <h2 style="color: #d1c4e9; margin: 20px 0;">Cuentos Clásicos Disponibles</h2>
        
        <div class="cuentos-grid" id="cuentosGrid">
            <!-- Los cuentos se cargarán dinámicamente aquí -->
        </div>

        <a href="../index.html" class="back-link">← Volver a JuegosBYF</a>
    </div>

    <script>
        // Sistema de partículas
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 2 + 0.5,
                    opacity: 0.3 + Math.random() * 0.4
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(179, 157, 219, ${p.opacity})`;
                ctx.fill();
            });
            
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 150;
                    
                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(126, 87, 194, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();

        // Lista de cuentos clásicos de dominio público en español
        const cuentosClasicos = [
            {
                title: "Caperucita Roja",
                author: "Charles Perrault / Hermanos Grimm",
                description: "Un clásico sobre una niña que visita a su abuela y se encuentra con un lobo feroz.",
                url: "https://es.wikipedia.org/wiki/Caperucita_Roja"
            },
            {
                title: "El patito feo",
                author: "Hans Christian Andersen",
                description: "La historia de un patito que es rechazado por ser diferente pero se convierte en un hermoso cisne.",
                url: "https://es.wikipedia.org/wiki/El_patito_feo"
            },
            {
                title: "Los tres cerditos",
                author: "Folklore inglés",
                description: "Tres hermanos cerditos construyen casas de diferentes materiales para protegerse del lobo.",
                url: "https://es.wikipedia.org/wiki/Los_tres_cerditos"
            },
            {
                title: "Blancanieves y los siete enanitos",
                author: "Hermanos Grimm",
                description: "Una princesa perseguida por su madrastra encuentra refugio con siete enanitos.",
                url: "https://es.wikipedia.org/wiki/Blancanieves"
            },
            {
                title: "Pinocho",
                author: "Carlo Collodi",
                description: "Un muñeco de madera que quiere convertirse en un niño de verdad.",
                url: "https://es.wikipedia.org/wiki/Pinocho"
            },
            {
                title: "La Cenicienta",
                author: "Charles Perrault",
                description: "Una joven maltratada por su madrastra logra asistir al baile real con ayuda de su hada madrina.",
                url: "https://es.wikipedia.org/wiki/Cenicienta"
            },
            {
                title: "Hansel y Gretel",
                author: "Hermanos Grimm",
                description: "Dos hermanos se pierden en el bosque y encuentran una casa de dulces.",
                url: "https://es.wikipedia.org/wiki/Hansel_y_Gretel"
            },
            {
                title: "El flautista de Hamelín",
                author: "Folklore alemán",
                description: "Un misterioso flautista libera a la ciudad de Hamelín de una plaga de ratas.",
                url: "https://es.wikipedia.org/wiki/El_flautista_de_Hamel%C3%ADn"
            },
            {
                title: "La Bella Durmiente",
                author: "Charles Perrault",
                description: "Una princesa maldita a dormir 100 años hasta que un príncipe la despierte.",
                url: "https://es.wikipedia.org/wiki/La_Bella_Durmiente"
            },
            {
                title: "Ricitos de Oro",
                author: "Folklore inglés",
                description: "Una niña con cabello dorado entra en la casa de tres osos.",
                url: "https://es.wikipedia.org/wiki/Ricitos_de_Oro"
            },
            {
                title: "El príncipe rana",
                author: "Hermanos Grimm",
                description: "Una princesa promete a una rana que la llevará a su castillo.",
                url: "https://es.wikipedia.org/wiki/El_pr%C3%ADncipe_rana"
            },
            {
                title: "La sirenita",
                author: "Hans Christian Andersen",
                description: "Una princesa sirena que quiere convertirse en humana.",
                url: "https://es.wikipedia.org/wiki/La_sirenita"
            },
            {
                title: "El emperador no tiene ropa",
                author: "Hans Christian Andersen",
                description: "Un emperador es engañado por dos estafadores que dicen que le están haciendo un traje mágico.",
                url: "https://es.wikipedia.org/wiki/El_emperador_no_tiene_ropa"
            },
            {
                title: "Los músicos de Bremen",
                author: "Hermanos Grimm",
                description: "Cuatro animales viejos deciden ir a Bremen para ser músicos.",
                url: "https://es.wikipedia.org/wiki/Los_m%C3%BAsicos_de_Bremen"
            },
            {
                title: "Pulgarcito",
                author: "Charles Perrault",
                description: "Un niño del tamaño de un pulgar que se pierde en el bosque.",
                url: "https://es.wikipedia.org/wiki/Pulgarcito"
            }
        ];

        function displayCuentos(cuentos) {
            const grid = document.getElementById('cuentosGrid');
            grid.innerHTML = '';
            
            if (cuentos.length === 0) {
                grid.innerHTML = `
                    <div class="cuento-card">
                        <h3 class="cuento-title">No se encontraron resultados</h3>
                        <p class="cuento-description">Intenta con otro término de búsqueda</p>
                    </div>
                `;
                return;
            }
            
            cuentos.forEach(cuento => {
                const card = document.createElement('div');
                card.className = 'cuento-card';
                
                card.innerHTML = `
                    <h3 class="cuento-title">${cuento.title}</h3>
                    <p class="cuento-description">${cuento.description}</p>
                    <p class="cuento-author" style="color: #b39ddb; font-size: 0.9em; margin-bottom: 15px;">
                        ✍️ ${cuento.author}
                    </p>
                    <div class="audio-player">
                        <a href="${cuento.url}" target="_blank" class="btn">
                            📖 Leer cuento completo
                        </a>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function searchCuentos() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            
            if (!searchTerm) {
                displayCuentos(cuentosClasicos);
                return;
            }
            
            const resultados = cuentosClasicos.filter(cuento => 
                cuento.title.toLowerCase().includes(searchTerm) ||
                cuento.author.toLowerCase().includes(searchTerm) ||
                cuento.description.toLowerCase().includes(searchTerm)
            );
            
            displayCuentos(resultados);
        }

        // Buscar al presionar Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchCuentos();
            }
        });

        // Cargar cuentos al iniciar
        displayCuentos(cuentosClasicos);

        // Manejo del formulario de subida
        document.getElementById('audioFile').addEventListener('change', function(e) {
            const label = document.getElementById('fileLabel');
            if (this.files.length > 0) {
                label.textContent = '✓ ' + this.files[0].name;
            } else {
                label.textContent = '📁 Seleccionar archivo de audio (MP3, WAV, OGG)';
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const titulo = document.getElementById('titulo').value;
            const descripcion = document.getElementById('descripcion').value;
            const audioFile = document.getElementById('audioFile').files[0];
            
            if (audioFile) {
                // Crear URL temporal para el audio
                const audioUrl = URL.createObjectURL(audioFile);
                
                // Crear nueva tarjeta de cuento
                const cuentoCard = document.createElement('div');
                cuentoCard.className = 'cuento-card';
                cuentoCard.innerHTML = `
                    <h3 class="cuento-title">${titulo}</h3>
                    <p class="cuento-description">${descripcion || 'Sin descripción'}</p>
                    <div class="audio-player">
                        <audio controls>
                            <source src="${audioUrl}" type="${audioFile.type}">
                            Tu navegador no soporta el elemento de audio.
                        </audio>
                    </div>
                `;
                
                // Agregar al grid
                const grid = document.getElementById('cuentosGrid');
                grid.insertBefore(cuentoCard, grid.firstChild);
                
                // Limpiar formulario
                this.reset();
                document.getElementById('fileLabel').textContent = '📁 Seleccionar archivo de audio (MP3, WAV, OGG)';
                
                alert('¡Cuento subido exitosamente!');
            }
        });
    </script>
</body>
</html>

    <script>
        // Sistema de partículas
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(80, Math.floor(window.innerWidth / 15));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 2 + 0.5,
                    opacity: 0.3 + Math.random() * 0.4
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(179, 157, 219, ${p.opacity})`;
                ctx.fill();
            });
            
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 150;
                    
                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(126, 87, 194, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();

        // Lógica del reproductor
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const currentTitle = document.getElementById('currentTitle');
        const currentDescription = document.getElementById('currentDescription');
        const visualizer = document.getElementById('visualizer');
        const playerImage = document.getElementById('playerImage');

        const cuentos = [
            {
                titulo: "Estrellita De Oro⭐️",
                descripcion: "Susurrado JAJA",
                fecha: "13/03/2026",
                url: "https://cdn.jsdelivr.net/gh/BrayanGt17/contarvacas@main/azafran/cuentos/Cuento1.m4a",
                image: "https://i.ibb.co/HTcwDqCf/Gemini-Generated-Image-w37ipyw37ipyw37i.png",
                likes: 0
            },
            {
                titulo: "El Principe Rana🐸",
                descripcion: "+2 Vasitos de agua",
                fecha: "14/03/2026",
                url: "https://cdn.jsdelivr.net/gh/BrayanGt17/contarvacas@main/azafran/cuentos/El%20Principe%20Rana.m4a",
                image: "https://i.ibb.co/HTcwDqCf/Gemini-Generated-Image-w37ipyw37ipyw37i.png",
                likes: 0
            },
            {
                titulo: "Los 3 Cerditos🐷",
                descripcion: "3 cerditos y el lobo",
                fecha: "18/03/2026",
                url: "https://cdn.jsdelivr.net/gh/BrayanGt17/contarvacas@main/azafran/cuentos/Los%203%20Cerditos.m4a",
                image: "https://i.ibb.co/HTcwDqCf/Gemini-Generated-Image-w37ipyw37ipyw37i.png",
                likes: 0
            },
            {
                titulo: "Ricitos De Oro🥣",
                descripcion: "La osita y las tres cosas",
                fecha: "18/03/2026",
                url: "https://cdn.jsdelivr.net/gh/BrayanGt17/contarvacas@main/azafran/cuentos/Ricitos%20De%20Oro.m4a",
                image: "https://i.ibb.co/HTcwDqCf/Gemini-Generated-Image-w37ipyw37ipyw37i.png",
                likes: 0
            }
        ];

        let currentTrack = 0;
        let isPlaying = false;
        let playCountedForTrack = false;
        const db = firebase.database();
        const likesRef = db.ref('likes');
        const playsRef = db.ref('plays');
        const commentsRef = db.ref('comments');
        let firebaseLikes = {};
        let firebasePlays = {};
        let firebaseComments = {};
        let firebaseLoaded = false;

        function renderCuentos() {
            const container = document.getElementById('cuentosContainer');
            container.innerHTML = '';
            
            if (cuentos.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #9e8ac4; padding: 30px;">No hay cuentos disponibles.</p>';
                return;
            }
            
            cuentos.forEach((cuento, index) => {
                const item = document.createElement('div');
                item.className = 'cuento-item';
                if (index === currentTrack) item.classList.add('active');
                
                const imageUrl = cuento.image || 'https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=200&h=200&fit=crop';
                const likedCuentos = JSON.parse(localStorage.getItem('likedCuentos') || '[]');
                const isLiked = likedCuentos.includes(index);
                const fbLikes = firebaseLikes[index] || 0;
                const fbPlays = firebasePlays[index] || 0;
                const totalLikes = fbLikes;
                
                item.innerHTML = `
                    <img src="${imageUrl}" alt="${cuento.titulo}" class="cuento-image" onerror="this.src='https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=200&h=200&fit=crop'">
                    <div class="cuento-info">
                        <div class="cuento-title">${cuento.titulo}</div>
                        <div class="cuento-description">${cuento.descripcion || ''}</div>
                        <div class="cuento-fecha">📅 ${cuento.fecha || ''}</div>
                        <div class="cuento-plays">▶️ ${fbPlays} reproducciones</div>
                    </div>
                    <div class="cuento-likes">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" data-index="${index}">
                            ${isLiked ? '💗' : '🤍'}
                        </button>
                        <span id="likes-${index}">${totalLikes}</span>
                    </div>
                `;
                
                const likeBtn = item.querySelector('.like-btn');
                likeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleLike(index, likeBtn, item);
                });
                
                item.addEventListener('click', () => loadTrack(index));
                container.appendChild(item);
            });
        }

        function toggleLike(index, btn, item) {
            const likedCuentos = JSON.parse(localStorage.getItem('likedCuentos') || '[]');
            const itemIndex = likedCuentos.indexOf(index);
            const btnRect = btn.getBoundingClientRect();
            const x = btnRect.left + btnRect.width / 2;
            const y = btnRect.top;
            
            if (itemIndex > -1) {
                likedCuentos.splice(itemIndex, 1);
                btn.classList.remove('liked');
                btn.textContent = '🤍';
                firebaseLikes[index] = Math.max(0, (firebaseLikes[index] || 0) - 1);
                likesRef.update({ [index]: firebaseLikes[index] });
            } else {
                likedCuentos.push(index);
                btn.classList.add('liked');
                btn.textContent = '💗';
                firebaseLikes[index] = (firebaseLikes[index] || 0) + 1;
                likesRef.update({ [index]: firebaseLikes[index] });
                spawnHearts(x, y, 15);
            }
            
            localStorage.setItem('likedCuentos', JSON.stringify(likedCuentos));
            
            const countSpan = document.getElementById(`likes-${index}`);
            if (countSpan) {
                countSpan.textContent = firebaseLikes[index] || 0;
            }
        }

        // Cargar likes y reproducciones de Firebase
        Promise.all([
            likesRef.once('value'),
            playsRef.once('value')
        ]).then(([likesSnapshot, playsSnapshot]) => {
            firebaseLikes = likesSnapshot.val() || {};
            firebasePlays = playsSnapshot.val() || {};
            firebaseLoaded = true;
            renderCuentos();
            loadTrack(0);
        });

        // Escuchar cambios en tiempo real - likes
        likesRef.on('value', (snapshot) => {
            const newLikes = snapshot.val() || {};
            if (JSON.stringify(newLikes) !== JSON.stringify(firebaseLikes)) {
                firebaseLikes = newLikes;
                if (firebaseLoaded) {
                    renderCuentos();
                }
            }
        });

        // Escuchar cambios en tiempo real - plays
        playsRef.on('value', (snapshot) => {
            const newPlays = snapshot.val() || {};
            if (JSON.stringify(newPlays) !== JSON.stringify(firebasePlays)) {
                firebasePlays = newPlays;
                if (firebaseLoaded) {
                    renderCuentos();
                }
            }
        });

        // Escuchar cambios en tiempo real - comments
        commentsRef.on('value', (snapshot) => {
            firebaseComments = snapshot.val() || {};
            renderComments(currentTrack);
        });

        function renderComments(index) {
            const commentsList = document.getElementById('commentsList');
            const commentStory = document.getElementById('commentStory');
            const storyName = cuentos[index]?.titulo || 'Cuento';
            commentStory.textContent = `Comentando en: ${storyName}`;
            
            const storyComments = firebaseComments[index] || [];
            const sortedComments = Object.values(storyComments).sort((a, b) => b.timestamp - a.timestamp);
            
            if (sortedComments.length === 0) {
                commentsList.innerHTML = '<p style="text-align: center; color: #9e8ac4;">Aún no hay comentarios. ¡Sé el primero!</p>';
                return;
            }
            
            commentsList.innerHTML = sortedComments.map(comment => `
                <div class="comment-item">
                    <div class="comment-header">
                        <span class="comment-name">${escapeHtml(comment.name)}</span>
                        <span class="comment-date">${formatDate(comment.timestamp)}</span>
                    </div>
                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
        }

        function addComment(index) {
            const nameInput = document.getElementById('commentName');
            const textInput = document.getElementById('commentText');
            const name = nameInput.value.trim();
            const text = textInput.value.trim();
            
            if (!name || !text) {
                alert('Por favor completa todos los campos');
                return;
            }
            
            const newComment = {
                name: name,
                text: text,
                timestamp: Date.now()
            };
            
            const storyComments = firebaseComments[index] || {};
            const commentKey = db.ref().push().key;
            storyComments[commentKey] = newComment;
            commentsRef.child(index).set(storyComments);
            
            nameInput.value = '';
            textInput.value = '';
        }

        document.getElementById('sendComment').addEventListener('click', () => addComment(currentTrack));

        function loadTrack(index) {
            currentTrack = index;
            playCountedForTrack = false;
            const cuento = cuentos[index];
            
            audio.src = cuento.url;
            currentTitle.textContent = cuento.titulo;
            currentDescription.textContent = cuento.descripcion || '';
            
            // Actualizar imagen del reproductor
            const imageUrl = cuento.image || 'https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=200&h=200&fit=crop';
            playerImage.src = imageUrl;
            playerImage.alt = cuento.titulo;
            playerImage.style.display = 'block';
            
            // Actualizar likes y reproducciones en el reproductor
            updatePlayerStats(index);
            
            // Actualizar comentarios
            renderComments(index);
            
            // Actualizar lista
            document.querySelectorAll('.cuento-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            
            if (isPlaying) {
                audio.play();
            }
        }

        function updatePlayerStats(index) {
            const likesCount = document.getElementById('playerLikes');
            const playsCount = document.getElementById('playerPlays');
            if (likesCount) likesCount.textContent = firebaseLikes[index] || 0;
            if (playsCount) playsCount.textContent = firebasePlays[index] || 0;
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
                visualizer.style.opacity = '0.3';
            } else {
                audio.play();
                playBtn.textContent = '❚❚';
                visualizer.style.opacity = '1';
                // Solo contar reproducción si no se ha contado para este cuento
                if (!playCountedForTrack) {
                    firebasePlays[currentTrack] = (firebasePlays[currentTrack] || 0) + 1;
                    playsRef.update({ [currentTrack]: firebasePlays[currentTrack] });
                    playCountedForTrack = true;
                    updatePlayerStats(currentTrack);
                    renderCuentos();
                }
            }
            isPlaying = !isPlaying;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${progress}%`;
            currentTimeEl.textContent = formatTime(audio.currentTime);
            durationEl.textContent = formatTime(audio.duration || 0);
        }

        function seek(e) {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % cuentos.length;
            loadTrack(currentTrack);
            if (isPlaying) audio.play();
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + cuentos.length) % cuentos.length;
            loadTrack(currentTrack);
            if (isPlaying) audio.play();
        }

        // Event listeners
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);
        progressContainer.addEventListener('click', seek);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', nextTrack);
        audio.addEventListener('loadedmetadata', updateProgress);

        // ====== CORAZONES EFFECT ======
        const heartsCanvas = document.getElementById('hearts-canvas');
        const ctx2 = heartsCanvas.getContext('2d');
        const hearts = [];

        function resizeHearts() {
            heartsCanvas.width = Math.floor(innerWidth * Math.min(2, window.devicePixelRatio || 1));
            heartsCanvas.height = Math.floor(innerHeight * Math.min(2, window.devicePixelRatio || 1));
            heartsCanvas.style.width = innerWidth + 'px';
            heartsCanvas.style.height = innerHeight + 'px';
        }
        addEventListener('resize', resizeHearts);
        resizeHearts();

        function spawnHearts(x, y, n = 15) {
            x *= Math.min(2, window.devicePixelRatio || 1);
            y *= Math.min(2, window.devicePixelRatio || 1);
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2;
                hearts.push({
                    x, y,
                    vx: Math.cos(a) * (0.6 + Math.random() * 0.8),
                    vy: -(0.8 + Math.random() * 1.2),
                    life: 1,
                    size: 10 + Math.random() * 16
                });
            }
        }

        function drawHeart(x, y, size) {
            const s = size;
            ctx2.save();
            ctx2.translate(x, y);
            ctx2.beginPath();
            ctx2.moveTo(0, -0.25 * s);
            ctx2.bezierCurveTo(.5 * s, -.9 * s, 1.4 * s, -.1 * s, 0, .9 * s);
            ctx2.bezierCurveTo(-1.4 * s, -.1 * s, -.5 * s, -.9 * s, 0, -0.25 * s);
            const g = ctx2.createRadialGradient(0, 0, 0, 0, 0, s);
            g.addColorStop(0, 'rgba(200, 150, 255, .95)');
            g.addColorStop(1, 'rgba(150, 100, 200, 0)');
            ctx2.fillStyle = g;
            ctx2.fill();
            ctx2.restore();
        }

        function loopHearts() {
            ctx2.clearRect(0, 0, heartsCanvas.width, heartsCanvas.height);
            for (let i = hearts.length - 1; i >= 0; i--) {
                const h = hearts[i];
                h.x += h.vx;
                h.y += h.vy;
                h.vy -= 0.02;
                h.life -= 0.015;
                ctx2.globalAlpha = Math.max(0, h.life);
                drawHeart(h.x, h.y, h.size);
                ctx2.globalAlpha = 1;
                if (h.life <= 0) hearts.splice(i, 1);
            }
            requestAnimationFrame(loopHearts);
        }
        loopHearts();
    </script>
</body>
</html>

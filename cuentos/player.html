<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio - BYFFOREVER💗</title>
    <style>
        :root {
            --primary: #ff69b4;
            --secondary: #7e57c2;
            --dark: #1a0a2e;
            --darker: #0d0518;
            --light: #e1bee7;
            --accent: #b39ddb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 50%, var(--darker) 100%);
            color: var(--light);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .player-container {
            background: linear-gradient(145deg, rgba(45, 45, 85, 0.95), rgba(25, 25, 55, 0.98));
            border: 2px solid rgba(126, 87, 194, 0.4);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 1;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 50px rgba(126, 87, 194, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        .player-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 500%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 105, 180, 0.05), rgba(126, 87, 194, 0.1), rgba(255, 105, 180, 0.05), transparent);
            animation: shimmerSlide 8s linear infinite;
            z-index: 0;
        }

        .player-content {
            position: relative;
            z-index: 1;
        }

        h1 {
            color: var(--light);
            margin-bottom: 30px;
            font-size: 2em;
            letter-spacing: 3px;
            animation: fadeIn 1s ease-out 0.2s both;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .visualizer {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin: 20px 0;
        }

        .bar {
            width: 6px;
            background: linear-gradient(to top, var(--primary), var(--secondary));
            border-radius: 3px;
            animation: visualize 1s ease-in-out infinite;
        }

        .bar:nth-child(1) { animation-delay: 0s; height: 20px; }
        .bar:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .bar:nth-child(3) { animation-delay: 0.2s; height: 40px; }
        .bar:nth-child(4) { animation-delay: 0.3s; height: 35px; }
        .bar:nth-child(5) { animation-delay: 0.4s; height: 25px; }

        audio {
            width: 100%;
            margin: 20px 0;
            border-radius: 15px;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .info {
            color: var(--accent);
            font-size: 1.1em;
            margin: 20px 0;
            padding: 15px;
            background: rgba(126, 87, 194, 0.1);
            border-radius: 15px;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .btn {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.6);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shimmerSlide {
            0% { transform: translateX(0); }
            100% { transform: translateX(20%); }
        }

        @keyframes visualize {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1.2); }
        }

        @media (max-width: 600px) {
            .player-container {
                padding: 30px 20px;
                width: 95%;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .btn {
                padding: 12px 30px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="player-container">
        <div class="player-content">
            <h1>🎵 Reproductor de Audio</h1>
            
            <div class="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            
            <audio id="audioPlayer" controls></audio>
            
            <p id="fileName" class="info">Cargando...</p>
            
            <a href="../index.html" class="btn">← Volver a BYFFOREVER💗</a>
        </div>
    </div>

    <script>
        // Sistema de partículas
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(60, Math.floor(window.innerWidth / 20));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    size: Math.random() * 2 + 0.5,
                    opacity: Math.random() * 0.4 + 0.1,
                    color: Math.random() > 0.5 ? '#7e57c2' : '#ff69b4'
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        resizeCanvas();
        initParticles();
        animate();

        // Obtener el parámetro de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const audioUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Audio';
        
        const audioPlayer = document.getElementById('audioPlayer');
        const fileName = document.getElementById('fileName');
        
        if (audioUrl) {
            fileName.textContent = title;
            
            // Cargar audio usando fetch (evita errores CORS)
            fetch(audioUrl)
                .then(response => {
                    if (!response.ok) throw new Error('No se pudo cargar el audio');
                    return response.blob();
                })
                .then(blob => {
                    // Crear URL del blob local
                    const blobUrl = URL.createObjectURL(blob);
                    audioPlayer.src = blobUrl;
                    
                    // Intentar reproducir automáticamente
                    audioPlayer.play().catch(e => {
                        console.log('Reproducción automática bloqueada:', e);
                        fileName.textContent = 'Haz clic en el botón de reproducción';
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    fileName.textContent = '❌ Error al cargar el audio';
                    
                    // Mostrar enlace de descarga como alternativa
                    const container = document.querySelector('.player-content');
                    const downloadBtn = document.createElement('a');
                    downloadBtn.href = audioUrl;
                    downloadBtn.textContent = '📥 Descargar audio';
                    downloadBtn.className = 'btn';
                    downloadBtn.style.marginTop = '15px';
                    downloadBtn.target = '_blank';
                    container.appendChild(downloadBtn);
                });
        } else {
            fileName.textContent = 'No se especificó un enlace de audio';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Audio</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
            color: #e1bee7;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .player-container {
            background: rgba(30, 30, 60, 0.9);
            border: 2px solid #7e57c2;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #d1c4e9;
            margin-bottom: 20px;
        }
        
        audio {
            width: 100%;
            margin: 20px 0;
            border-radius: 10px;
        }
        
        .info {
            color: #b39ddb;
            font-size: 0.9em;
            margin-top: 15px;
        }
        
        .btn {
            background: linear-gradient(135deg, #4527a0 0%, #5e35b1 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-weight: 600;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
        }
    </style>
</head>
<body>
    <div class="player-container">
        <h1>🎵 Reproductor de Audio</h1>
        <audio id="audioPlayer" controls></audio>
        <p id="fileName" class="info"></p>
        <a href="../index.html" class="btn">← Volver a Juegos</a>
    </div>

    <script>
        // Obtener el parámetro de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const audioUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Audio';
        
        const audioPlayer = document.getElementById('audioPlayer');
        const fileName = document.getElementById('fileName');
        
        if (audioUrl) {
            audioPlayer.src = audioUrl;
            fileName.textContent = title;
            
            // Intentar reproducir automáticamente
            audioPlayer.play().catch(e => {
                console.log('No se pudo reproducir automáticamente:', e);
            });
        } else {
            fileName.textContent = 'No se especificó un enlace de audio';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaca Corredora</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a0a2e, #2d1b4e);
            font-family: 'Arial', sans-serif;
            color: #e1bee7;
            overflow: hidden;
            touch-action: none;
        }
        
        #gameCanvas {
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 8/3;
            border: 3px solid #7e57c2;
            border-radius: 10px;
            background: linear-gradient(to bottom, #1a0a2e 0%, #2d1b4e 100%);
            box-shadow: 0 0 20px rgba(126, 87, 194, 0.5);
        }
        
        .ui {
            margin-top: 20px;
            text-align: center;
        }
        
        .score {
            font-size: 1.5em;
            color: #d1c4e9;
        }
        
        .instructions {
            margin-top: 10px;
            color: #b39ddb;
            font-size: 0.9em;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            background: #4527a0;
            color: white;
            border: 1px solid #7e57c2;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #7e57c2;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="300"></canvas>
    <div class="ui">
        <div class="score">Puntuación: <span id="score">0</span></div>
        <div class="instructions">Presiona ESPACIO o TOCA para saltar</div>
        <div class="controls">
            <button id="startBtn">Iniciar</button>
            <button id="pauseBtn">Pausar</button>
            <button id="restartBtn">Reiniciar</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        // Separador para formato 00000 00000 (asumiendo 10 dígitos en dos grupos)
        // Para un solo grupo de 5 dígitos, lo dejamos simple
        
        // Configuración del juego
        const config = {
            gravity: 0.6,
            jumpForce: -12,
            groundHeight: 50,
            obstacleSpeed: 6,
            obstacleGap: 150,
            minObstacleGap: 120,
            maxObstacleGap: 200
        };
        
        // Estado del juego
        let gameState = {
            playing: false,
            paused: false,
            score: 0,
            highScore: 0
        };
        
        // Vaca
        const cow = {
            x: 100,
            y: 0,
            width: 60,
            height: 50,
            velocityY: 0,
            isJumping: false,
            jumpCount: 0,
            maxJumps: 2
        };
        
        // Cargar imagen de la vaca
        const cowImage = new Image();
        cowImage.src = 'https://i.ibb.co/QFgJ3D0Q/pngegg.png';
        let cowImageLoaded = false;
        cowImage.onload = () => { cowImageLoaded = true; };
        
        // Fix: Añadir try/catch para prevenir errores de carga
        cowImage.onerror = () => { console.log('Imagen de vaca no disponible, usando fallback'); };
        
        // Suelo
        let groundY = canvas.height - config.groundHeight;
        cow.y = groundY - cow.height;
        
        // Obstáculos (cactus modificados para noche)
        let obstacles = [];
        let nextObstacleX = canvas.width + 200;
        
        // Nubes/estrellas decorativas
        let stars = [];
        let clouds = [];
        
        // Inicializar estrellas
        function initStars() {
            stars = [];
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (groundY - 100),
                    size: Math.random() * 2 + 1,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }
        
        // Dibujar estrellas
        function drawStars() {
            stars.forEach(star => {
                star.twinkle += 0.05;
                const opacity = 0.3 + Math.sin(star.twinkle) * 0.3;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // Sistema de nubes
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 100 + 50,
                    width: 80 + Math.random() * 40,
                    speed: 0.5 + Math.random() * 0.5
                });
            }
        }
        
        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = canvas.width + cloud.width;
                    cloud.y = Math.random() * 100 + 50;
                }
            });
        }
        
        function drawClouds() {
            clouds.forEach(cloud => {
                ctx.fillStyle = 'rgba(100, 100, 150, 0.4)';
                
                // Dibujar nube simple
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.width / 2, 20, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x - 20, cloud.y + 5, cloud.width / 3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x + 20, cloud.y + 5, cloud.width / 3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // Sistema de partículas con conexiones (constelación morada)
        let particles = [];
        
        function initParticles() {
            particles = [];
            const particleCount = 40;
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * 0.7,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 1,
                    color: `hsla(${260 + Math.random() * 40}, 60%, 70%, ${0.3 + Math.random() * 0.4})`
                });
            }
        }
        
        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height * 0.7) p.vy *= -1;
            });
        }
        
        function drawParticles() {
            // Dibujar partículas
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fill();
            });
            
            // Dibujar líneas de conexión
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 120;
                    
                    if (distance < maxDistance) {
                        const opacity = 1 - (distance / maxDistance);
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(179, 157, 219, ${opacity * 0.3})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });
            });
        }
        
        // Dibujar vaca con imagen
        function drawCow() {
            const x = cow.x;
            const y = cow.y;
            
            if (cowImageLoaded) {
                ctx.save();
                // Girar la imagen si está cayendo para dar sensación de salto
                const rotation = cow.velocityY * 0.02;
                const centerX = x + cow.width / 2;
                const centerY = y + cow.height / 2;
                
                ctx.translate(centerX, centerY);
                ctx.rotate(rotation);
                ctx.drawImage(cowImage, -cow.width / 2, -cow.height / 2, cow.width, cow.height);
                ctx.restore();
            } else {
                // Fallback: dibujar vaca simple mientras carga
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(x, y, cow.width, cow.height);
                ctx.fillStyle = '#F5F5DC';
                ctx.fillRect(x + 5, y + 5, cow.width - 10, cow.height - 15);
            }
        }
        
        // Dibujar suelo
        function drawGround() {
            // Césped
            ctx.fillStyle = '#1B5E20';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            
            // Detalles del suelo
            ctx.fillStyle = '#2E7D32';
            for (let i = 0; i < canvas.width; i += 20) {
                const offset = (gameState.score * 2 + i) % 40;
                ctx.beginPath();
                ctx.moveTo(i, groundY);
                ctx.lineTo(i + 10, groundY + 5);
                ctx.lineTo(i + 20, groundY);
                ctx.fill();
            }
        }
        
        // Crear obstáculo
        function createObstacle() {
            const type = Math.random() > 0.5 ? 'fence' : 'barn';
            const obstacle = {
                x: nextObstacleX,
                width: type === 'fence' ? 30 : 60,
                height: type === 'fence' ? 50 : 40,
                type: type,
                passed: false
            };
            nextObstacleX += obstacle.width + config.obstacleGap + Math.random() * 50 - 25;
            return obstacle;
        }
        
        // Dibujar obstáculo
        function drawObstacle(obs) {
            const y = groundY - obs.height;
            
            if (obs.type === 'fence') {
                // Valla
                ctx.fillStyle = '#5D4037';
                ctx.fillRect(obs.x, y, obs.width, obs.height);
                ctx.fillStyle = '#4E342E';
                ctx.fillRect(obs.x + 5, y, 20, 5);
                ctx.fillRect(obs.x + 5, y + 15, 20, 5);
                ctx.fillRect(obs.x + 5, y + 30, 20, 5);
            } else {
                // Corral pequeño
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(obs.x, y, obs.width, obs.height);
                ctx.fillStyle = '#654321';
                ctx.fillRect(obs.x + 5, y + 10, obs.width - 10, 5);
            }
        }
        
        // Actualizar vaca
        function updateCow() {
            if (!gameState.playing || gameState.paused) return;
            
            // Gravedad
            cow.velocityY += config.gravity;
            cow.y += cow.velocityY;
            
            // Colisión con suelo
            if (cow.y >= groundY - cow.height) {
                cow.y = groundY - cow.height;
                cow.velocityY = 0;
                cow.jumpCount = 0;
                cow.isJumping = false;
            }
        }
        
        // Actualizar obstáculos
        function updateObstacles() {
            if (!gameState.playing || gameState.paused) return;
            
            obstacles.forEach(obs => {
                obs.x -= config.obstacleSpeed;
                
                // Contar puntos
                if (!obs.passed && obs.x + obs.width < cow.x) {
                    obs.passed = true;
                    gameState.score++;
                    
                    // Formato 00000
                    const scoreStr = gameState.score.toString().padStart(5, '0');
                    scoreEl.textContent = scoreStr;
                    
                    // Sonido cada 10 puntos
                    if (gameState.score % 10 === 0) {
                        playMilestoneSound(gameState.score);
                        config.obstacleSpeed += 0.3;
                    }
                }
            });
            
            // Eliminar obstáculos fuera de pantalla
            obstacles = obstacles.filter(obs => obs.x > -100);
            
            // Crear nuevos obstáculos
            while (obstacles.length === 0 || 
                   obstacles[obstacles.length - 1].x < canvas.width + config.obstacleGap) {
                obstacles.push(createObstacle());
            }
        }
        
        // Saltar - instantáneo sin retraso
        function jump() {
            if (!gameState.playing || gameState.paused) return;
            
            // Salto doble permitido
            if (cow.jumpCount < cow.maxJumps) {
                // Resetear velocidad vertical instantáneamente
                cow.velocityY = config.jumpForce;
                cow.jumpCount++;
                cow.isJumping = true;
            }
        }
        
        // Preparar saltos táctiles (para evitar delay)
        function setupTouchControls() {
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!gameState.playing) {
                    startGame();
                } else {
                    jump();
                }
            });
        }
        
        // Colisión (arreglada para no tocar falsamente)
        function checkCollision() {
            for (let obs of obstacles) {
                const obsY = groundY - obs.height;
                
                // AABB collision con margen de error para mejor gameplay
                const margin = 5; // Margen para no tocar de cerca
                
                if (cow.x + margin < obs.x + obs.width &&
                    cow.x + cow.width - margin > obs.x &&
                    cow.y + margin < obsY + obs.height &&
                    cow.y + cow.height - margin > obsY) {
                    
                    gameOver();
                    return true;
                }
            }
            return false;
        }
        
        // Sonido al perder
        function playGameOverSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const notes = [300, 250, 200, 150];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
                
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + i * 0.15);
                osc.stop(audioCtx.currentTime + i * 0.15 + 0.3);
            });
        }
        
        // Game over
        function gameOver() {
            gameState.playing = false;
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
            }
            
            playGameOverSound();
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#e1bee7';
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('¡GAME OVER!', canvas.width / 2, canvas.height / 2 - 30);
            ctx.font = '20px Arial';
            ctx.fillText(`Puntuación: ${gameState.score}`, canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText(`Récord: ${gameState.highScore}`, canvas.width / 2, canvas.height / 2 + 40);
        }
        
        // Bucle principal
        function gameLoop() {
            // Limpiar canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Actualizar y dibujar partículas (fondo)
            updateParticles();
            drawParticles();
            
            // Actualizar y dibujar nubes
            updateClouds();
            drawClouds();
            
            // Dibujar fondo
            drawStars();
            drawGround();
            
            // Dibujar obstáculos
            obstacles.forEach(drawObstacle);
            
            // Actualizar
            updateCow();
            updateObstacles();
            checkCollision();
            
            // Dibujar vaca
            drawCow();
            
            // Si está jugando o pausado, continuar
            if (gameState.playing || gameState.paused) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Iniciar juego
        function startGame() {
            console.log('Iniciando juego...');
            gameState.playing = true;
            gameState.paused = false;
            gameState.score = 0;
            scoreEl.textContent = '00000';
            
            cow.y = groundY - cow.height;
            cow.velocityY = 0;
            cow.jumpCount = 0;
            cow.isJumping = false;
            
            obstacles = [];
            nextObstacleX = canvas.width + 200;
            config.obstacleSpeed = 6;
            
            initStars();
            initClouds();
            initParticles();
            
            // Reiniciar bucle de juego si no está corriendo
            if (!gameState.paused) {
                gameLoop();
            }
        }
        
        // Sonido al pausar
        function playPauseSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(220, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }
        
        // Pausar/Reanudar
        function togglePause() {
            if (!gameState.playing) return;
            
            gameState.paused = !gameState.paused;
            document.getElementById('pauseBtn').textContent = gameState.paused ? 'Reanudar' : 'Pausar';
            
            playPauseSound();
            
            if (!gameState.paused) {
                gameLoop();
            } else {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e1bee7';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSA', canvas.width / 2, canvas.height / 2);
            }
        }
        
        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameState.playing) {
                    startGame();
                } else {
                    jump();
                }
            }
        });
        
        // Prevenir selección de texto al hacer clic rápido
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
        });
        
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (!gameState.playing) {
                startGame();
            } else {
                jump();
            }
        });
        
        setupTouchControls();
        
        // Evitar selección de texto en todo el body
        document.body.style.userSelect = 'none';
        document.body.style.webkitUserSelect = 'none';
        
        // Sonido de hito (cada 10 puntos)
        let audioCtx = null;
        
        function playMilestoneSound(score) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // Melodía ascendente según puntaje
            const baseFreq = 400 + (score / 10) * 50;
            const notes = [baseFreq, baseFreq * 1.25, baseFreq * 1.5, baseFreq * 2];
            
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.08);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.08);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + i * 0.08 + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.2);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + i * 0.08);
                osc.stop(audioCtx.currentTime + i * 0.08 + 0.25);
            });
        }
        
        // Dibujar estado inicial
        initParticles();
        initStars();
        initClouds();
        
        // Bucle inicial para mostrar partículas
        function initialLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateParticles();
            drawParticles();
            drawClouds();
            drawStars();
            drawGround();
            drawCow();
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e1bee7';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Presiona INICIAR o ESPACIO', canvas.width / 2, canvas.height / 2);
            
            if (!gameState.playing) {
                requestAnimationFrame(initialLoop);
            }
        }
        
        initialLoop();
        
        console.log('Juego listo. Canvas:', canvas.width, 'x', canvas.height);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Dino Vaca - JuegosBYF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e1bee7;
            overflow: hidden;
            touch-action: none;
            position: relative;
        }
        
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #gameCanvas {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 8/3;
            border: 2px solid #7e57c2;
            border-radius: 15px;
            background: linear-gradient(to bottom, #1a0a2e 0%, #2d1b4e 100%);
            box-shadow: 0 0 30px rgba(126, 87, 194, 0.4),
                        inset 0 0 60px rgba(0, 0, 0, 0.3);
        }
        
        #orientationOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 100%);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            color: #e1bee7;
            text-align: center;
            padding: 20px;
        }
        
        #orientationOverlay.active {
            display: flex;
        }
        
        .orientation-icon {
            font-size: 5em;
            margin-bottom: 20px;
            animation: rotate 1s ease-in-out infinite;
        }
        
        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
        
        .orientation-text {
            font-size: 1.8em;
            margin-bottom: 15px;
            color: #d1c4e9;
            font-weight: 600;
        }
        
        .orientation-hint {
            color: #b39ddb;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        .orientation-btn {
            background: linear-gradient(135deg, #4527a0 0%, #5e35b1 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .orientation-btn:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(126, 87, 194, 0.5);
        }
        
        .score-display {
            position: fixed;
            top: 20px;
            right: 20px;
            text-align: right;
            z-index: 10;
            background: rgba(20, 20, 40, 0.8);
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid rgba(126, 87, 194, 0.5);
        }
        
        .distance {
            font-size: 1.5em;
            color: #d1c4e9;
            font-weight: 600;
        }
        
        .record {
            font-size: 1em;
            color: #b39ddb;
            margin-top: 5px;
        }
        
        .game-over-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 40, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #7e57c2;
            text-align: center;
            z-index: 100;
            display: none;
            box-shadow: 0 0 40px rgba(126, 87, 194, 0.5);
        }
        
        .game-over-screen.active {
            display: block;
        }
        
        .game-over-title {
            font-size: 2.5em;
            color: #e1bee7;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(179, 157, 219, 0.5);
        }
        
        .game-over-stats {
            margin: 20px 0;
            color: #d1c4e9;
            font-size: 1.2em;
        }
        
        .retry-btn {
            padding: 15px 50px;
            background: linear-gradient(135deg, #4527a0 0%, #5e35b1 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .retry-btn:hover {
            background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%);
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(126, 87, 194, 0.5);
        }
        
        .instructions-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #b39ddb;
            font-size: 0.9em;
            z-index: 5;
            background: rgba(20, 20, 40, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    
    <div id="orientationOverlay">
        <div class="orientation-icon">📱</div>
        <div class="orientation-text">Gira tu dispositivo</div>
        <div class="orientation-hint">El juego se ve mejor en horizontal</div>
        <button class="orientation-btn" onclick="dismissOrientation()">Entendido</button>
    </div>
    
    <canvas id="gameCanvas" width="800" height="300"></canvas>
    
    <div class="score-display">
        <div class="distance">00000</div>
        <div class="record">Récord: 00000</div>
    </div>
    
    <div class="instructions-overlay">Presiona ESPACIO o TOCA para saltar</div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-title">GAME OVER</div>
        <div class="game-over-stats">
            <div>Distancia: <span id="finalScore">0</span></div>
            <div>Récord: <span id="finalRecord">0</span></div>
        </div>
        <button class="retry-btn" onclick="restartGame()">REINTENTAR</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const particleCanvas = document.getElementById('particleCanvas');
        const particleCtx = particleCanvas.getContext('2d');
        const distanceEl = document.querySelector('.distance');
        const recordEl = document.querySelector('.record');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const finalRecordEl = document.getElementById('finalRecord');
        
        // Separador para formato 00000 00000 (asumiendo 10 dígitos en dos grupos)
        // Para un solo grupo de 5 dígitos, lo dejamos simple
        
        // Configuración del juego
        const config = {
            gravity: 0.6,
            jumpForce: -12,
            groundHeight: 50,
            obstacleSpeed: 6,
            obstacleGap: 150,
            minObstacleGap: 120,
            maxObstacleGap: 200
        };
        
        // Estado del juego
        let gameState = {
            playing: false,
            paused: false,
            score: 0,
            highScore: 0
        };
        
        // Vaca
        const cow = {
            x: 100,
            y: 0,
            width: 60,
            height: 50,
            velocityY: 0,
            isJumping: false,
            jumpCount: 0,
            maxJumps: 2
        };
        
        // Cargar imagen de la vaca
        const cowImage = new Image();
        cowImage.src = 'https://i.ibb.co/QFgJ3D0Q/pngegg.png';
        let cowImageLoaded = false;
        cowImage.onload = () => { cowImageLoaded = true; };
        
        // Fix: Añadir try/catch para prevenir errores de carga
        cowImage.onerror = () => { console.log('Imagen de vaca no disponible, usando fallback'); };
        
        // Suelo
        let groundY = canvas.height - config.groundHeight;
        cow.y = groundY - cow.height;
        
        // Obstáculos (cactus modificados para noche)
        let obstacles = [];
        let nextObstacleX = canvas.width + 200;
        
        // Nubes/estrellas decorativas
        let stars = [];
        let clouds = [];
        
        // Inicializar estrellas
        function initStars() {
            stars = [];
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (groundY - 100),
                    size: Math.random() * 2 + 1,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }
        
        // Dibujar estrellas
        function drawStars() {
            stars.forEach(star => {
                star.twinkle += 0.05;
                const opacity = 0.3 + Math.sin(star.twinkle) * 0.3;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // Sistema de nubes
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 100 + 50,
                    width: 80 + Math.random() * 40,
                    speed: 0.5 + Math.random() * 0.5
                });
            }
        }
        
        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = canvas.width + cloud.width;
                    cloud.y = Math.random() * 100 + 50;
                }
            });
        }
        
        function drawClouds() {
            clouds.forEach(cloud => {
                ctx.fillStyle = 'rgba(100, 100, 150, 0.4)';
                
                // Dibujar nube simple
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.width / 2, 20, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x - 20, cloud.y + 5, cloud.width / 3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x + 20, cloud.y + 5, cloud.width / 3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // Sistema de partículas con conexiones (constelación morada)
        let particles = [];
        
        function initParticles() {
            particles = [];
            const particleCount = Math.min(80, Math.floor(particleCanvas.width / 15));
            
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * particleCanvas.width,
                    y: Math.random() * particleCanvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 2 + 0.5,
                    opacity: 0.3 + Math.random() * 0.4
                });
            }
        }
        
        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0 || p.x > particleCanvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > particleCanvas.height) p.vy *= -1;
            });
        }
        
        function drawParticles() {
            // Limpiar canvas de partículas
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            // Dibujar partículas
            particles.forEach(p => {
                particleCtx.beginPath();
                particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                particleCtx.fillStyle = `rgba(179, 157, 219, ${p.opacity || 0.4})`;
                particleCtx.fill();
            });
            
            // Dibujar líneas de conexión
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDistance = 150;
                    
                    if (distance < maxDistance) {
                        const opacity = (1 - distance / maxDistance) * 0.15;
                        particleCtx.beginPath();
                        particleCtx.moveTo(p1.x, p1.y);
                        particleCtx.lineTo(p2.x, p2.y);
                        particleCtx.strokeStyle = `rgba(126, 87, 194, ${opacity})`;
                        particleCtx.lineWidth = 1;
                        particleCtx.stroke();
                    }
                });
            });
        }
        
        // Dibujar vaca con imagen
        function drawCow() {
            const x = cow.x;
            const y = cow.y;
            
            if (cowImageLoaded) {
                ctx.save();
                // Girar la imagen si está cayendo para dar sensación de salto
                const rotation = cow.velocityY * 0.02;
                const centerX = x + cow.width / 2;
                const centerY = y + cow.height / 2;
                
                ctx.translate(centerX, centerY);
                ctx.rotate(rotation);
                ctx.drawImage(cowImage, -cow.width / 2, -cow.height / 2, cow.width, cow.height);
                ctx.restore();
            } else {
                // Fallback: dibujar vaca simple mientras carga
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(x, y, cow.width, cow.height);
                ctx.fillStyle = '#F5F5DC';
                ctx.fillRect(x + 5, y + 5, cow.width - 10, cow.height - 15);
            }
        }
        
        // Dibujar suelo
        function drawGround() {
            // Césped
            ctx.fillStyle = '#1B5E20';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            
            // Detalles del suelo
            ctx.fillStyle = '#2E7D32';
            for (let i = 0; i < canvas.width; i += 20) {
                const offset = (gameState.score * 2 + i) % 40;
                ctx.beginPath();
                ctx.moveTo(i, groundY);
                ctx.lineTo(i + 10, groundY + 5);
                ctx.lineTo(i + 20, groundY);
                ctx.fill();
            }
        }
        
        // Crear obstáculo
        function createObstacle() {
            const type = Math.random() > 0.5 ? 'fence' : 'barn';
            const obstacle = {
                x: nextObstacleX,
                width: type === 'fence' ? 30 : 60,
                height: type === 'fence' ? 50 : 40,
                type: type,
                passed: false
            };
            nextObstacleX += obstacle.width + config.obstacleGap + Math.random() * 50 - 25;
            return obstacle;
        }
        
        // Dibujar obstáculo
        function drawObstacle(obs) {
            const y = groundY - obs.height;
            
            if (obs.type === 'fence') {
                // Valla
                ctx.fillStyle = '#5D4037';
                ctx.fillRect(obs.x, y, obs.width, obs.height);
                ctx.fillStyle = '#4E342E';
                ctx.fillRect(obs.x + 5, y, 20, 5);
                ctx.fillRect(obs.x + 5, y + 15, 20, 5);
                ctx.fillRect(obs.x + 5, y + 30, 20, 5);
            } else {
                // Corral pequeño
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(obs.x, y, obs.width, obs.height);
                ctx.fillStyle = '#654321';
                ctx.fillRect(obs.x + 5, y + 10, obs.width - 10, 5);
            }
        }
        
        // Actualizar vaca
        function updateCow() {
            if (!gameState.playing || gameState.paused) return;
            
            // Gravedad
            cow.velocityY += config.gravity;
            cow.y += cow.velocityY;
            
            // Colisión con suelo
            if (cow.y >= groundY - cow.height) {
                cow.y = groundY - cow.height;
                cow.velocityY = 0;
                cow.jumpCount = 0;
                cow.isJumping = false;
            }
        }
        
        // Actualizar obstáculos
        function updateObstacles() {
            if (!gameState.playing || gameState.paused) return;
            
            obstacles.forEach(obs => {
                obs.x -= config.obstacleSpeed;
                
                // Contar puntos
                if (!obs.passed && obs.x + obs.width < cow.x) {
                    obs.passed = true;
                    gameState.score++;
                    
                    // Formato 00000
                    const scoreStr = gameState.score.toString().padStart(5, '0');
                    distanceEl.textContent = scoreStr;
                    
                    // Sonido cada 10 puntos
                    if (gameState.score % 10 === 0) {
                        playMilestoneSound(gameState.score);
                        config.obstacleSpeed += 0.3;
                    }
                }
            });
            
            // Eliminar obstáculos fuera de pantalla
            obstacles = obstacles.filter(obs => obs.x > -100);
            
            // Crear nuevos obstáculos
            while (obstacles.length === 0 || 
                   obstacles[obstacles.length - 1].x < canvas.width + config.obstacleGap) {
                obstacles.push(createObstacle());
            }
        }
        
        // Saltar - instantáneo sin retraso
        function jump() {
            if (!gameState.playing || gameState.paused) return;
            
            // Salto doble permitido
            if (cow.jumpCount < cow.maxJumps) {
                // Resetear velocidad vertical instantáneamente
                cow.velocityY = config.jumpForce;
                cow.jumpCount++;
                cow.isJumping = true;
            }
        }
        
        // Preparar saltos táctiles (para evitar delay)
        function setupTouchControls() {
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (!gameState.playing) {
                    startGame();
                } else {
                    jump();
                }
            });
        }
        
        // Colisión (arreglada para no tocar falsamente)
        function checkCollision() {
            for (let obs of obstacles) {
                const obsY = groundY - obs.height;
                
                // AABB collision con margen de error para mejor gameplay
                const margin = 5; // Margen para no tocar de cerca
                
                if (cow.x + margin < obs.x + obs.width &&
                    cow.x + cow.width - margin > obs.x &&
                    cow.y + margin < obsY + obs.height &&
                    cow.y + cow.height - margin > obsY) {
                    
                    gameOver();
                    return true;
                }
            }
            return false;
        }
        
        // Sonido al perder
        function playGameOverSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const notes = [300, 250, 200, 150];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
                
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + i * 0.15);
                osc.stop(audioCtx.currentTime + i * 0.15 + 0.3);
            });
        }
        
        // Game over
        function gameOver() {
            gameState.playing = false;
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
            }
            
            playGameOverSound();
            
            // Actualizar récord en la pantalla
            recordEl.textContent = 'Récord: ' + gameState.highScore.toString().padStart(5, '0');
            
            // Mostrar pantalla de game over
            finalScoreEl.textContent = gameState.score.toString().padStart(5, '0');
            finalRecordEl.textContent = gameState.highScore.toString().padStart(5, '0');
            gameOverScreen.classList.add('active');
        }
        
        function restartGame() {
            startGame();
        }
        
        // Bucle principal
        function gameLoop() {
            // Limpiar canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Actualizar y dibujar partículas (fondo)
            updateParticles();
            drawParticles();
            
            // Actualizar y dibujar nubes
            updateClouds();
            drawClouds();
            
            // Dibujar fondo
            drawStars();
            drawGround();
            
            // Dibujar obstáculos
            obstacles.forEach(drawObstacle);
            
            // Actualizar
            updateCow();
            updateObstacles();
            checkCollision();
            
            // Dibujar vaca
            drawCow();
            
            // Si está jugando o pausado, continuar
            if (gameState.playing || gameState.paused) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Iniciar juego
        function startGame() {
            console.log('Iniciando juego...');
            gameState.playing = true;
            gameState.paused = false;
            gameState.score = 0;
            distanceEl.textContent = '00000';
            gameOverScreen.classList.remove('active');
            
            cow.y = groundY - cow.height;
            cow.velocityY = 0;
            cow.jumpCount = 0;
            cow.isJumping = false;
            
            obstacles = [];
            nextObstacleX = canvas.width + 200;
            config.obstacleSpeed = 6;
            
            initStars();
            initClouds();
            initParticles();
            
            // Reiniciar bucle de juego si no está corriendo
            if (!gameState.paused) {
                gameLoop();
            }
        }
        
        // Sonido al pausar
        function playPauseSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(220, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }
        
        // Pausar/Reanudar
        function togglePause() {
            if (!gameState.playing) return;
            
            gameState.paused = !gameState.paused;
            document.getElementById('pauseBtn').textContent = gameState.paused ? 'Reanudar' : 'Pausar';
            
            playPauseSound();
            
            if (!gameState.paused) {
                gameLoop();
            } else {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e1bee7';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSA', canvas.width / 2, canvas.height / 2);
            }
        }
        
        // Event listeners
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameState.playing) {
                    startGame();
                } else {
                    jump();
                }
            }
        });
        
        // Prevenir selección de texto al hacer clic rápido
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
        });
        
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (!gameState.playing) {
                startGame();
            } else {
                jump();
            }
        });
        
        setupTouchControls();
        
        // Evitar selección de texto en todo el body
        document.body.style.userSelect = 'none';
        document.body.style.webkitUserSelect = 'none';
        
        // Sonido de hito (cada 10 puntos)
        let audioCtx = null;
        
        function playMilestoneSound(score) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // Melodía ascendente según puntaje
            const baseFreq = 400 + (score / 10) * 50;
            const notes = [baseFreq, baseFreq * 1.25, baseFreq * 1.5, baseFreq * 2];
            
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.08);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.08);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + i * 0.08 + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.2);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(audioCtx.currentTime + i * 0.08);
                osc.stop(audioCtx.currentTime + i * 0.08 + 0.25);
            });
        }
        
        // Inicializar tamaño de canvas de partículas
        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
            initParticles();
        }
        
        resizeParticleCanvas();
        
        window.addEventListener('resize', resizeParticleCanvas);
        
        // Dibujar estado inicial
        initParticles();
        initStars();
        initClouds();
        
        // Bucle inicial para mostrar partículas
        function initialLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            updateParticles();
            drawParticles();
            drawClouds();
            drawStars();
            drawGround();
            drawCow();
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e1bee7';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Presiona INICIAR o ESPACIO', canvas.width / 2, canvas.height / 2);
            
            if (!gameState.playing) {
                requestAnimationFrame(initialLoop);
            }
        }
        
        initialLoop();
        
        console.log('Juego listo. Canvas:', canvas.width, 'x', canvas.height);
        
        // Detectar orientación y mostrar overlay si es vertical
        function checkOrientation() {
            const overlay = document.getElementById('orientationOverlay');
            const isVertical = window.innerHeight > window.innerWidth;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isPortrait = window.matchMedia("(orientation: portrait)").matches;
            
            // Solo mostrar overlay en móviles en modo vertical
            if (isMobile && isPortrait) {
                overlay.classList.add('active');
                // Pausar el juego si está activo
                if (gameState.playing) {
                    gameState.paused = true;
                }
            } else {
                overlay.classList.remove('active');
                // Reanudar si estaba jugando y no estaba pausado manualmente
                if (gameState.playing && !gameState.paused) {
                    gameLoop();
                }
            }
        }
        
        // Función para cerrar el overlay
        function dismissOrientation() {
            document.getElementById('orientationOverlay').classList.remove('active');
            // Reanudar el juego si estaba activo
            if (gameState.playing && !gameState.paused) {
                gameLoop();
            }
        }
        
        // Verificar al cargar y al cambiar orientación
        checkOrientation();
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
        
        // Hacer la función accesible globalmente
        window.dismissOrientation = dismissOrientation;
    </script>
</body>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramo de Tulipanes Morados - BYFFOREVER💗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 50%, #3d2b5e 100%);
            font-family: 'Georgia', serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            z-index: 10;
            margin-bottom: 50px;
            animation: fadeInDown 1.5s ease-out;
        }

        .title {
            font-size: 3em;
            color: #e8d5f2;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            letter-spacing: 5px;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #b39ddb;
            font-size: 1.2em;
            font-style: italic;
        }

        .bouquet {
            position: relative;
            width: 400px;
            height: 350px;
            margin: 0 auto;
            z-index: 5;
        }

        /* Tulipanes */
        .tulip {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
            animation: sway 3s ease-in-out infinite;
        }

        .tulip:nth-child(1) { left: 50%; transform: translateX(-50%) rotate(-5deg); animation-delay: 0s; }
        .tulip:nth-child(2) { left: 40%; transform: translateX(-50%) rotate(-15deg); animation-delay: 0.2s; }
        .tulip:nth-child(3) { left: 60%; transform: translateX(-50%) rotate(15deg); animation-delay: 0.4s; }
        .tulip:nth-child(4) { left: 30%; transform: translateX(-50%) rotate(-25deg); animation-delay: 0.6s; }
        .tulip:nth-child(5) { left: 70%; transform: translateX(-50%) rotate(25deg); animation-delay: 0.8s; }

        .stem {
            width: 8px;
            height: 180px;
            background: linear-gradient(90deg, #228B22 0%, #32CD32 50%, #228B22 100%);
            margin: 0 auto;
            border-radius: 4px;
            position: relative;
        }

        .flower {
            position: relative;
            width: 60px;
            height: 70px;
            margin: 0 auto;
            bottom: 10px;
        }

        .petal {
            position: absolute;
            width: 30px;
            height: 50px;
            background: linear-gradient(135deg, #8B00FF 0%, #9932CC 50%, #8B00FF 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 
                inset 0 0 10px rgba(138, 43, 226, 0.5),
                0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .petal:nth-child(1) {
            left: 15px;
            top: 0;
            transform: rotate(0deg);
        }

        .petal:nth-child(2) {
            left: 0;
            top: 10px;
            transform: rotate(-30deg);
        }

        .petal:nth-child(3) {
            right: 0;
            top: 10px;
            transform: rotate(30deg);
        }

        .petal:nth-child(4) {
            left: 5px;
            top: 20px;
            transform: rotate(-15deg);
        }

        .petal:nth-child(5) {
            right: 5px;
            top: 20px;
            transform: rotate(15deg);
        }

        .center {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #FFD700 0%, #FFA500 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .leaf {
            position: absolute;
            width: 40px;
            height: 20px;
            background: linear-gradient(90deg, #228B22 0%, #32CD32 100%);
            border-radius: 0 100% 0 100%;
            bottom: 60px;
        }

        .leaf:nth-child(1) {
            left: -25px;
            transform: rotate(-30deg);
        }

        .leaf:nth-child(2) {
            right: -25px;
            transform: rotate(30deg) scaleX(-1);
        }

        /* Partículas/flor */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #e8d5f2 0%, #8B00FF 100%);
            border-radius: 50%;
            animation: floatParticle 8s infinite linear;
            opacity: 0.6;
        }

        /* Animaciones */
        @keyframes sway {
            0%, 100% { transform: translateX(-50%) rotate(var(--rotation, -5deg)); }
            50% { transform: translateX(-50%) rotate(calc(var(--rotation, -5deg) + 5deg)); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Mensaje debajo */
        .message {
            position: absolute;
            bottom: 50px;
            text-align: center;
            color: #b39ddb;
            font-size: 1.1em;
            font-style: italic;
            animation: fadeInUp 2s ease-out 1s both;
            z-index: 10;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Volver al inicio */
        .back-link {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #b39ddb;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid rgba(139, 0, 255, 0.3);
            border-radius: 20px;
            transition: all 0.3s;
            z-index: 10;
            font-size: 0.9em;
        }

        .back-link:hover {
            background: rgba(139, 0, 255, 0.2);
            border-color: rgba(139, 0, 255, 0.6);
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .title { font-size: 2em; }
            .bouquet { width: 300px; height: 250px; }
            .stem { height: 120px; }
            .petal { width: 22px; height: 35px; }
            .flower { width: 45px; height: 52px; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <a href="../index.html" class="back-link">← Volver a BYFFOREVER💗</a>

    <div class="container">
        <div class="header">
            <h1 class="title">🌷 Tulipanes Morados 🌷</h1>
            <p class="subtitle">Un ramo de amor y belleza eterna</p>
        </div>

        <div class="bouquet">
            <!-- Tulipán 1 -->
            <div class="tulip" style="--rotation: -5deg;">
                <div class="flower">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
                <div class="stem">
                    <div class="leaf"></div>
                    <div class="leaf"></div>
                </div>
            </div>

            <!-- Tulipán 2 -->
            <div class="tulip" style="--rotation: -15deg;">
                <div class="flower">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
                <div class="stem">
                    <div class="leaf"></div>
                    <div class="leaf"></div>
                </div>
            </div>

            <!-- Tulipán 3 -->
            <div class="tulip" style="--rotation: 5deg;">
                <div class="flower">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
                <div class="stem">
                    <div class="leaf"></div>
                    <div class="leaf"></div>
                </div>
            </div>

            <!-- Tulipán 4 -->
            <div class="tulip" style="--rotation: -25deg;">
                <div class="flower">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
                <div class="stem">
                    <div class="leaf"></div>
                    <div class="leaf"></div>
                </div>
            </div>

            <!-- Tulipán 5 -->
            <div class="tulip" style="--rotation: 25deg;">
                <div class="flower">
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="petal"></div>
                    <div class="center"></div>
                </div>
                <div class="stem">
                    <div class="leaf"></div>
                    <div class="leaf"></div>
                </div>
            </div>
        </div>

        <div class="message">
            <p>💭 Cada tulipán morado representa un momento especial 💭</p>
        </div>
    </div>

    <script>
        // Crear partículas flotantes
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (5 + Math.random() * 5) + 's';
                particle.style.width = (5 + Math.random() * 8) + 'px';
                particle.style.height = particle.style.width;
                particlesContainer.appendChild(particle);
            }
        }

        // Efecto de brillo en los tulipanes al hacer hover
        function addHoverEffects() {
            const tulips = document.querySelectorAll('.tulip');
            tulips.forEach(tulip => {
                tulip.addEventListener('mouseenter', () => {
                    tulip.style.filter = 'brightness(1.2)';
                    tulip.style.transform += ' scale(1.1)';
                });
                tulip.addEventListener('mouseleave', () => {
                    tulip.style.filter = '';
                    tulip.style.transform = tulip.style.transform.replace(' scale(1.1)', '');
                });
            });
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            addHoverEffects();

            // Ajustar animación de partículas para que sean más suaves
            const style = document.createElement('style');
            style.textContent = `
                @keyframes floatParticle {
                    0% {
                        transform: translateY(100vh) translateX(0) rotate(0deg) scale(0);
                        opacity: 0;
                    }
                    10% {
                        opacity: 0.7;
                        transform: scale(1);
                    }
                    90% {
                        opacity: 0.4;
                    }
                    100% {
                        transform: translateY(-100px) translateX(50px) rotate(180deg) scale(0.5);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);
        });

        // Agregar efecto de clic para crear nuevas partículas
        document.addEventListener('click', (e) => {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            particle.style.position = 'fixed';
            particle.style.animation = 'none';
            particle.style.opacity = '1';
            particle.style.transform = 'scale(1.5)';
            
            document.body.appendChild(particle);

            // Animación personalizada para el clic
            let opacity = 1;
            let scale = 1.5;
            const animate = () => {
                opacity -= 0.02;
                scale += 0.02;
                particle.style.opacity = opacity;
                particle.style.transform = `scale(${scale})`;
                
                if (opacity > 0) {
                    requestAnimationFrame(animate);
                } else {
                    particle.remove();
                }
            };
            animate();
        });
    </script>
</body>
</html>

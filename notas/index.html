<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notitas 💌 Por que si</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MRZTTZBHJH"></script>
    <script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            padding-bottom: 100px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 3em;
            background: linear-gradient(180deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 154, 158, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            color: #fecfef;
            font-size: 1.2em;
            margin-top: 10px;
            opacity: 0.8;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 154, 158, 0.5);
            color: #ff9a9e;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(255, 154, 158, 0.2);
            transform: scale(1.05);
        }

        .notes-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .notes-counter {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(255, 154, 158, 0.3);
        }

        .notes-counter span {
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .notes-counter p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-top: 5px;
        }

        .note-form {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 154, 158, 0.3);
            backdrop-filter: blur(10px);
        }

        .note-input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1em;
            resize: none;
            margin-bottom: 15px;
            font-family: inherit;
        }

        .note-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .note-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
        }

        .color-picker-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .color-picker-row label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        .color-options {
            display: flex;
            gap: 8px;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .color-option:hover {
            transform: scale(1.2);
        }

        .color-option.selected {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .color-option.rosa { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .color-option.amarillo { background: linear-gradient(135deg, #ffe066, #fff3bf); }
        .color-option.verde { background: linear-gradient(135deg, #81c784, #c8e6c9); }
        .color-option.azul { background: linear-gradient(135deg, #64b5f6, #bbdefb); }
        .color-option.morado { background: linear-gradient(135deg, #ba68c8, #e1bee7); }
        .color-option.naranja { background: linear-gradient(135deg, #ff9800, #ffe0b2); }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #1a0a2e;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 154, 158, 0.5);
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .note-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 154, 158, 0.2);
            backdrop-filter: blur(10px);
            animation: slideIn 0.5s ease-out;
            position: relative;
        }

        .note-card.rosa { background: linear-gradient(135deg, rgba(255, 154, 158, 0.3), rgba(254, 207, 239, 0.2)); border-color: rgba(255, 154, 158, 0.5); }
        .note-card.amarillo { background: linear-gradient(135deg, rgba(255, 235, 59, 0.3), rgba(255, 243, 176, 0.2)); border-color: rgba(255, 235, 59, 0.5); }
        .note-card.verde { background: linear-gradient(135deg, rgba(129, 199, 132, 0.3), rgba(200, 230, 201, 0.2)); border-color: rgba(129, 199, 132, 0.5); }
        .note-card.azul { background: linear-gradient(135deg, rgba(100, 181, 246, 0.3), rgba(187, 222, 251, 0.2)); border-color: rgba(100, 181, 246, 0.5); }
        .note-card.morado { background: linear-gradient(135deg, rgba(171, 71, 188, 0.3), rgba(206, 147, 216, 0.2)); border-color: rgba(171, 71, 188, 0.5); }
        .note-card.naranja { background: linear-gradient(135deg, rgba(255, 152, 0, 0.3), rgba(255, 213, 79, 0.2)); border-color: rgba(255, 152, 0, 0.5); }

        .note-card.amarillo .note-text { color: #5d4037; }
        .note-card.verde .note-text { color: #2e7d32; }
        .note-card.azul .note-text { color: #1565c0; }
        .note-card.morado .note-text { color: #6a1b9a; }
        .note-card.naranja .note-text { color: #e65100; }

        .note-card.amarillo .note-date,
        .note-card.verde .note-date,
        .note-card.azul .note-date,
        .note-card.morado .note-date,
        .note-card.naranja .note-date { color: rgba(0, 0, 0, 0.5); }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-text {
            color: #fff;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .note-date {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
        }

        .note-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .like-btn {
            background: rgba(255, 154, 158, 0.2);
            border: 1px solid rgba(255, 154, 158, 0.5);
            color: #ff9a9e;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .like-btn:hover {
            background: rgba(255, 154, 158, 0.4);
            transform: scale(1.05);
        }

        .like-btn.liked {
            background: rgba(255, 154, 158, 0.5);
        }

        .delete-btn {
            background: rgba(255, 100, 100, 0.2);
            border: none;
            color: #ff6b6b;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .delete-btn:hover {
            background: rgba(255, 100, 100, 0.4);
        }

        .heart-effect {
            position: fixed;
            pointer-events: none;
            font-size: 2em;
            animation: floatUp 3s ease-out forwards;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-200px) scale(0.5); }
        }

        .empty-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            padding: 40px;
            font-style: italic;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 0.5vmin;
            height: 0.5vmin;
            background: rgba(255, 154, 158, 0.6);
            border-radius: 50%;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .color-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .color-toggle:hover {
            background: rgba(255, 215, 0, 0.4);
        }

        /* Tema morado */
        body.purple-theme {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #2d1b4e 100%);
        }

        body.purple-theme .title {
            background: linear-gradient(180deg, #e1bee7 0%, #ce93d8 50%, #9c27b0 100%);
            -webkit-background-clip: text;
            background-clip: text;
        }

        body.purple-theme .subtitle,
        body.purple-theme .note-text {
            color: #e1bee7;
        }

        body.purple-theme .note-form,
        body.purple-theme .note-card {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(206, 147, 216, 0.3);
        }

        body.purple-theme .like-btn {
            background: rgba(156, 39, 176, 0.2);
            border-color: rgba(156, 39, 176, 0.5);
            color: #ce93d8;
        }

        body.purple-theme .color-toggle {
            background: rgba(156, 39, 176, 0.2);
            border-color: rgba(156, 39, 176, 0.5);
            color: #ce93d8;
        }

        body.purple-theme .particle {
            background: rgba(156, 39, 176, 0.6);
        }

        .content {
            position: relative;
            z-index: 1;
        }

        /* Tema rosa (default) */
        .color-toggle {
            background: rgba(255, 154, 158, 0.2);
            border-color: rgba(255, 154, 158, 0.5);
            color: #ff9a9e;
        }

        .color-toggle:hover {
            background: rgba(255, 154, 158, 0.4);
        }

        .countdown-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(26, 10, 46, 0.98), rgba(45, 27, 78, 0.98));
            border-top: 3px solid rgba(255, 105, 180, 0.7);
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(15px);
            z-index: 1000;
            box-shadow: 0 -5px 30px rgba(255, 105, 180, 0.3);
        }

        .countdown-message {
            color: #fecfef;
            font-size: 1em;
            margin-bottom: 12px;
            font-style: italic;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .countdown-unit {
            background: linear-gradient(135deg, rgba(255, 154, 158, 0.3), rgba(254, 207, 239, 0.2));
            border-radius: 20px;
            padding: 15px 25px;
            border: 2px solid rgba(255, 154, 158, 0.5);
            min-width: 90px;
        }

        .countdown-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #ff9a9e;
            text-shadow: 0 0 15px rgba(255, 154, 158, 0.7);
            font-variant-numeric: tabular-nums;
        }

        .countdown-label {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        @keyframes tick {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .countdown-number.tick {
            animation: tick 0.2s ease-out;
        }

        .countdown-final {
            color: #ff9a9e;
            font-size: 1.1em;
            font-weight: bold;
            animation: pulse 1s ease-in-out infinite;
        }

        body.purple-theme .countdown-footer {
            background: linear-gradient(180deg, rgba(10, 10, 26, 0.98), rgba(26, 10, 46, 0.98));
            border-color: rgba(206, 147, 216, 0.7);
            box-shadow: 0 -5px 30px rgba(171, 71, 188, 0.3);
        }

        body.purple-theme .countdown-message {
            color: #e1bee7;
        }

        body.purple-theme .countdown-unit {
            background: linear-gradient(135deg, rgba(206, 147, 216, 0.3), rgba(171, 71, 188, 0.2));
            border-color: rgba(206, 147, 216, 0.5);
        }

        body.purple-theme .countdown-number {
            color: #ce93d8;
            text-shadow: 0 0 15px rgba(206, 147, 216, 0.7);
        }

        body.purple-theme .countdown-final {
            color: #ce93d8;
        }

        body {
            padding-bottom: 180px;
        }
    </style>
</head>
<body>
    <a href="../" class="back-btn">← Menú</a>
    <button class="color-toggle" onclick="toggleColor()">🟣 Oscuro</button>
    
    <div class="particles" id="particles"></div>
    
        <div class="content">
        <div class="header">
            <h1 class="title">Notitas </h1>
            <p class="subtitle">Deja una nota JAJA</p>
        </div>

        <div class="notes-container">
            <div class="notes-counter">
                <span id="notesCount">0</span>
                <p>notitas 💕</p>
            </div>

            <div class="note-form">
                <textarea class="note-input" id="noteInput" placeholder="Escribe tu notita aquí... 🐮" rows="4"></textarea>
                <div class="color-picker-row">
                    <label>Color:</label>
                    <div class="color-options">
                        <div class="color-option rosa selected" data-color="rosa" onclick="selectColor(this)"></div>
                        <div class="color-option amarillo" data-color="amarillo" onclick="selectColor(this)"></div>
                        <div class="color-option verde" data-color="verde" onclick="selectColor(this)"></div>
                        <div class="color-option azul" data-color="azul" onclick="selectColor(this)"></div>
                        <div class="color-option morado" data-color="morado" onclick="selectColor(this)"></div>
                        <div class="color-option naranja" data-color="naranja" onclick="selectColor(this)"></div>
                    </div>
                </div>
                <button class="submit-btn" onclick="submitNote()">Publicar Nota 🦒</button>
            </div>

            <div class="notes-list" id="notesList">
                <div class="empty-message">Aún no hay notitas... No me amas :(</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB9pndlShc23wlT9eW7M5tN5gRjW8hV4c",
            authDomain: "byfforever-9c691.firebaseapp.com",
            databaseURL: "https://byfforever-9c691-default-rtdb.firebaseio.com",
            projectId: "byfforever-9c691",
            storageBucket: "byfforever-9c691.appspot.com",
            messagingSenderId: "704201009855",
            appId: "1:704201009855:web:b5a7c8e2d3f4e5a6b7c8d"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let selectedNoteColor = 'rosa';

        // Crear partículas
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (5 + Math.random() * 10) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        function selectColor(el) {
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedNoteColor = el.dataset.color;
        }

        // Cargar notas
        function loadNotes() {
            database.ref('notas').orderByChild('timestamp').on('value', (snapshot) => {
                const notesList = document.getElementById('notesList');
                const notesCount = document.getElementById('notesCount');
                notesList.innerHTML = '';
                
                const notes = [];
                snapshot.forEach((child) => {
                    notes.push({ id: child.key, ...child.val() });
                });
                
                // Actualizar contador
                notesCount.textContent = notes.length;
                
                // Mostrar de más nuevo a más antiguo
                notes.reverse();
                
                if (notes.length === 0) {
                    notesList.innerHTML = '<div class="empty-message">Aún no hay notitas... ¡Sé el primero en dejar una! 💕</div>';
                    return;
                }
                
                notes.forEach((note) => {
                    const noteCard = createNoteCard(note);
                    notesList.appendChild(noteCard);
                });
            });
        }

        function createNoteCard(note) {
            const card = document.createElement('div');
            card.className = 'note-card';
            if (note.color) {
                card.classList.add(note.color);
            }
            card.id = 'note-' + note.id;
            
            const date = new Date(note.timestamp);
            const formattedDate = date.toLocaleDateString('es-ES', {
                day: 'numeric',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const likedClass = note.likedBy && note.likedBy[getUserId()] ? 'liked' : '';
            const likes = note.likes || 0;
            
            card.innerHTML = `
                <div class="note-text">${escapeHtml(note.text)}</div>
                <div class="note-footer">
                    <span class="note-date">${formattedDate}</span>
                    <div class="note-actions">
                        <button class="like-btn ${likedClass}" onclick="likeNote('${note.id}')">
                            💗 <span id="likes-${note.id}">${likes}</span>
                        </button>
                        <button class="delete-btn" onclick="deleteNote('${note.id}')">🗑️</button>
                    </div>
                </div>
            `;
            
            return card;
        }

        function submitNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();
            
            if (!text) {
                alert('Escribe algo primero! 💕');
                return;
            }
            
            const newNote = {
                text: text,
                timestamp: Date.now(),
                likes: 0,
                likedBy: {},
                color: selectedNoteColor
            };
            
            database.ref('notas').push(newNote);
            input.value = '';
        }

        function likeNote(noteId) {
            const userId = getUserId();
            const noteRef = database.ref('notas/' + noteId);
            
            noteRef.once('value').then((snapshot) => {
                const note = snapshot.val();
                if (!note) return;
                
                let likes = note.likes || 0;
                let likedBy = note.likedBy || {};
                
                if (likedBy[userId]) {
                    delete likedBy[userId];
                    likes--;
                } else {
                    likedBy[userId] = true;
                    likes++;
                    createHeartEffect();
                }
                
                noteRef.update({ likes, likedBy });
            });
        }

        function getUserId() {
            let userId = localStorage.getItem('notasUserId');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('notasUserId', userId);
            }
            return userId;
        }

        function deleteNote(noteId) {
            if (confirm('¿Eliminar esta notita? 💔')) {
                database.ref('notas/' + noteId).remove();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function createHeartEffect() {
            const hearts = ['💗', '💕', '💖', '💘', '💝'];
            const heart = document.createElement('div');
            heart.className = 'heart-effect';
            heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = (Math.random() * 80 + 10) + '%';
            heart.style.top = (Math.random() * 50 + 30) + '%';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }

        function toggleColor() {
            document.body.classList.toggle('purple-theme');
            const btn = document.querySelector('.color-toggle');
            if (document.body.classList.contains('purple-theme')) {
                btn.textContent = '⚪️ Claro';
            } else {
                btn.textContent = '🟣 Oscuro';
            }
        }

        // Inicializar
        loadNotes();

        // Cuenta regresiva
        const TOTAL_HOURS = 4000;
        let remainingSeconds = TOTAL_HOURS * 3600;

        function updateCountdown() {
            const hours = Math.floor(remainingSeconds / 3600);
            const minutes = Math.floor((remainingSeconds % 3600) / 60);
            const seconds = remainingSeconds % 60;

            const hoursEl = document.getElementById('countdown-hours');
            const minutesEl = document.getElementById('countdown-minutes');
            const secondsEl = document.getElementById('countdown-seconds');

            hoursEl.textContent = hours;
            minutesEl.textContent = minutes;
            secondsEl.textContent = seconds;

            // Animacion de tic
            if (secondsEl) {
                secondsEl.classList.remove('tick');
                void secondsEl.offsetWidth;
                secondsEl.classList.add('tick');
            }

            if (remainingSeconds > 0) {
                remainingSeconds--;
            }
        }

        function loadCountdown() {
            const saved = localStorage.getItem('countdownStart');
            if (saved) {
                const elapsed = Math.floor((Date.now() - parseInt(saved)) / 1000);
                remainingSeconds = Math.max(0, TOTAL_HOURS * 3600 - elapsed);
            } else {
                localStorage.setItem('countdownStart', Date.now());
            }
            updateCountdown();
            setInterval(updateCountdown, 1000);
        }

        loadCountdown();
    </script>

    <div class="countdown-footer">
        <p class="countdown-message">⏰⏰ Tienes... ⏰⏰</p>
        <div class="countdown-timer" id="countdownTimer">
            <div class="countdown-unit">
                <div class="countdown-number" id="countdown-hours">4000</div>
                <div class="countdown-label">horas</div>
            </div>
            <div class="countdown-unit">
                <div class="countdown-number" id="countdown-minutes">00</div>
                <div class="countdown-label">minutos</div>
            </div>
            <div class="countdown-unit">
                <div class="countdown-number" id="countdown-seconds">00</div>
                <div class="countdown-label">segundos</div>
            </div>
        </div>
        <p class="countdown-message" style="margin-top: 10px; font-size: 0.9em;">
            💕💗💕 para pensar en volver conmigo... o ya dime que sí 💕💗💕
        </p>
    </div>
</body>
